name: Notify Users of New Jobs

on:
  schedule:
    # 5 min au lieu de 10 : un job publié à 14h56 attend jusqu'à 5 min avant
    # d'être notifié au lieu de 10 (et GitHub Actions ajoute déjà lui-même
    # quelques minutes de délai en pratique aux heures de forte charge).
    # NB : ce cron reste un compromis "polling", pas du vrai temps réel.
    # Pour du push quasi instantané (job détecté en secondes, pas en minutes),
    # il faudrait remplacer ce workflow par une Cloud Function Firebase
    # déclenchée directement sur l'écriture "jobs/{id}" (onCreate) — voir
    # https://firebase.google.com/docs/functions/database-events
    - cron: "*/5 * * * *"
  workflow_dispatch: # déclenchement manuel possible

concurrency:
  group: notify-jobs
  cancel-in-progress: false # on met en file d'attente plutôt que d'annuler un envoi en cours

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run notification script
        run: node scripts/sendNotifications.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

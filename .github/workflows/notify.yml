name: Notify Users of New Jobs

on:
  schedule:
    # Ce cron n'est plus le déclencheur principal : le relais Cloudflare Worker
    # (voir worker/index.js) déclenche ce workflow instantanément via
    # repository_dispatch juste après la publication d'un job. Ce cron ne sert
    # plus que de FILET DE SÉCURITÉ (relais en panne, job publié pendant une
    # coupure réseau, etc.), d'où un intervalle plus large.
    - cron: "*/15 * * * *"
  workflow_dispatch: # déclenchement manuel possible
  repository_dispatch:
    types: [new-job] # déclenché instantanément par worker/index.js à chaque nouveau job

concurrency:
  group: notify-jobs
  cancel-in-progress: false # on met en file d'attente plutôt que d'annuler un envoi en cours

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run notification script
        run: node scripts/sendNotifications.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

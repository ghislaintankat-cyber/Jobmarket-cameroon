name: Notify Users of New Jobs

on:
  schedule:
    - cron: "*/10 * * * *" # toutes les 10 minutes
  workflow_dispatch: # déclenchement manuel possible

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install dependencies
        # npm ci exige un package-lock.json committé ; tant qu'il n'existe pas,
        # on utilise npm install. Dès que vous committez package-lock.json,
        # remplacez cette ligne par : run: npm ci
        run: npm install

      - name: Run notification script
        run: node scripts/sendNotifications.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

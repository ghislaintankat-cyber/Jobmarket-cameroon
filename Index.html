<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Pro 🛰️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: #0f172a; font-family: sans-serif; overflow: hidden; }
        header { background: #1e293b; color: white; padding: 10px; text-align: center; border-bottom: 2px solid #06b6d4; cursor: pointer; user-select: none; }
        #map { flex-grow: 1; width: 100%; height: 100%; }
        .footer-fixe { position: fixed; bottom: 0; width: 100%; height: 70px; background: #1e293b; display: flex; align-items: center; justify-content: center; z-index: 1000; border-top: 2px solid #06b6d4; }
        .btn-pub { background: #06b6d4; color: #0f172a; border: none; width: 90%; height: 50px; border-radius: 12px; font-weight: bold; font-size: 16px; cursor: pointer; }
        
        /* Modal Style */
        #formModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid #06b6d4; color: white; }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 8px; border: none; background: #0f172a; color: white; font-size: 16px; box-sizing: border-box; }
        
        /* Bouton Supprimer */
        .btn-del { background: #ef4444; color: white; border: none; padding: 8px; border-radius: 8px; margin-top: 10px; cursor: pointer; width: 100%; font-weight: bold; }
        .admin-tag { background: red; color: white; padding: 2px 5px; border-radius: 4px; font-size: 10px; margin-left: 5px; }
    </style>
</head>
<body>

    <header id="mainTitle"><b>JOBMARKET CAMEROUN 🛰️</b> <span id="adminStatus" style="display:none;" class="admin-tag">ADMIN</span></header>
    
    <div id="map"></div>
    
    <div class="footer-fixe">
        <button class="btn-pub" onclick="document.getElementById('formModal').style.display='flex'">🚀 PUBLIER UNE MISSION</button>
    </div>

    <div id="formModal">
        <div class="modal-content">
            <h3 style="color:#06b6d4; margin-top:0;">Nouvelle Annonce</h3>
            <select id="mType">
                <option value="🛠️ Dépannage">🛠️ Dépannage</option>
                <option value="📦 Livraison">📦 Livraison</option>
                <option value="🧹 Ménage">🧹 Ménage</option>
            </select>
            <input type="text" id="userName" placeholder="Ton nom">
            <input type="number" id="userPhone" placeholder="WhatsApp (ex: 699...)">
            <textarea id="mDesc" placeholder="Description..."></textarea>
            <button class="btn-pub" id="btnValider" onclick="publier()">VALIDER LA PUBLICATION</button>
            <button onclick="document.getElementById('formModal').style.display='none'" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, push, onChildAdded, onChildRemoved, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            storageBucket: "jobmarketfuture.firebasestorage.app",
            messagingSenderId: "351669024349",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const missionsRef = ref(db, 'missions');

        // GESTION DES IDS ET ADMIN
        if(!localStorage.getItem('myUID')) localStorage.setItem('myUID', Math.random().toString(36).substring(7));
        const myUID = localStorage.getItem('myUID');
        let isAdmin = (localStorage.getItem('isAdmin') === 'true');

        if(isAdmin) document.getElementById('adminStatus').style.display = 'inline';

        var map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);
        L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);

        let markers = {};

        // FONCTION DE SUPPRESSION
        window.supprimerMission = (id) => {
            if(confirm("Supprimer définitivement cette annonce ?")) {
                remove(ref(db, 'missions/' + id));
            }
        };

        // AFFICHER LES MISSIONS
        onChildAdded(missionsRef, (snapshot) => {
            const id = snapshot.key;
            const m = snapshot.val();
            
            const canDelete = (m.ownerID === myUID || isAdmin);
            const deleteBtn = canDelete ? `<button class="btn-del" onclick="supprimerMission('${id}')">🗑️ SUPPRIMER</button>` : "";
            
            const marker = L.marker([m.lat, m.lng]).addTo(map)
                .bindPopup(`<b>${m.type}</b><br>${m.name}<br>${m.desc}<br><br>
                <a href="https://wa.me/237${m.phone}" target="_blank" style="background:#25D366; color:white; padding:10px; display:block; text-align:center; text-decoration:none; border-radius:8px; font-weight:bold;">💬 WhatsApp</a>
                ${deleteBtn}`);
            
            markers[id] = marker;
        });

        onChildRemoved(missionsRef, (snapshot) => {
            const id = snapshot.key;
            if(markers[id]) { map.removeLayer(markers[id]); delete markers[id]; }
        });

        // PUBLIER
        window.publier = () => {
            const data = {
                name: document.getElementById('userName').value || "Anonyme",
                phone: document.getElementById('userPhone').value,
                type: document.getElementById('mType').value,
                desc: document.getElementById('mDesc').value,
                ownerID: myUID
            };

            if(!data.phone || !data.desc) return alert("Remplis le numéro et la description !");

            const btn = document.getElementById('btnValider');
            btn.innerText = "🛰️ Localisation...";

            navigator.geolocation.getCurrentPosition((pos) => {
                data.lat = pos.coords.latitude;
                data.lng = pos.coords.longitude;
                push(missionsRef, data).then(() => {
                    document.getElementById('formModal').style.display='none';
                    alert("✅ Mission publiée !");
                });
            }, (err) => alert("Erreur GPS. Active la localisation !"), {enableHighAccuracy:true});
        };

        // --- LE SECRET DE L'ADMIN ---
        let clickCount = 0;
        document.getElementById('mainTitle').onclick = () => {
            clickCount++;
            if(clickCount === 5) {
                const code = prompt("Entrez le code secret ADMIN :");
                if(code === "237BO") { // Ton code secret
                    isAdmin = true;
                    localStorage.setItem('isAdmin', 'true');
                    document.getElementById('adminStatus').style.display = 'inline';
                    alert("Bienvenue Boss ! Tu peux maintenant tout supprimer.");
                    location.reload();
                } else {
                    clickCount = 0;
                    alert("Code incorrect.");
                }
            }
        };

        setTimeout(() => map.invalidateSize(), 500);
    </script>
</body>
</html>

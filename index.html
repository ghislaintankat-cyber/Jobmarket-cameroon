<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<div id="map"></div>

<div id="jobsList" class="hidden"></div>

<div id="formBox" class="hidden form">
  <input id="title" placeholder="Titre du job">
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="Téléphone">
  <button onclick="addJob()">Publier</button>
</div>

<button id="fab" onclick="toggleForm()">+</button>

<nav>
  <button onclick="showMap()">Carte</button>
  <button onclick="showList()">Jobs</button>
</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="app.js"></script>

</body>
    </html>

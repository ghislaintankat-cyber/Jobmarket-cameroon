<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Cameroon</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
button{
  background:#f59e0b;
  border:none;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  margin-top:20px;
}
input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>JobMarket 🚀</h1>

<input id="amount" placeholder="Montant (XAF)">
<br>
<button onclick="payer()">Payer</button>

<script>
const API = "https://jobmarket-backend-6gqm.onrender.com";

async function payer(){
  try{
    const amount = document.getElementById("amount").value;

    if(!amount){
      alert("Entre un montant");
      return;
    }

    const res = await fetch(API + "/payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount })
    });

    // 🔥 lire la réponse brute
    const text = await res.text();

    let data;
    try{
      data = JSON.parse(text);
    }catch(e){
      alert("Réponse serveur invalide:\n" + text);
      return;
    }

    if(data.link){
      window.location.href = data.link;
    }else{
      alert("Erreur serveur:\n" + JSON.stringify(data));
    }

  }catch(err){
    alert("Erreur réseau:\n" + err);
  }
}

// DEBUG ANDROID
window.onerror = function(message, source, lineno) {
  alert("Erreur JS:\n" + message + "\nligne " + lineno);
};

window.addEventListener("unhandledrejection", function(event) {
  alert("Erreur Promise:\n" + event.reason);
});
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

</head>

<body>

<div id="map"></div>

<!-- FORM -->
<div id="formBox" class="hidden">
    <input id="title" placeholder="Titre">
    <input id="price" placeholder="Prix">
    <input id="phone" placeholder="Téléphone">
    <button onclick="addJob()">Publier</button>
</div>

<!-- NAV -->
<div class="nav">
    <button onclick="showMap()">📍</button>
    <button onclick="showList()">📋</button>
    <button onclick="toggleForm()">➕</button>
</div>

<div id="list" class="hidden"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="app.js"></script>

</body>

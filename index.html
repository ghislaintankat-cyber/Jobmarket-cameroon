<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Pro | Cameroun</title>

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body>

    <div id="map"></div>

    <div class="top-bar">
        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" placeholder="Rechercher un service au Cameroun...">
        </div>
    </div>

    <div id="jobsScreen" class="screen-panel hidden"></div>

    <div id="accountScreen" class="screen-panel hidden">
        <div class="auth-box">
            <h3>Mon Compte</h3>
            <input id="email" type="email" placeholder="Email">
            <input id="password" type="password" placeholder="Mot de passe">
            <div class="auth-buttons">
                <button onclick="login()" class="btn-login">Connexion</button>
                <button onclick="register()" class="btn-reg">S'inscrire</button>
            </div>
            <button onclick="googleLogin()" class="btn-google"><i class="fab fa-google"></i> Google Login</button>
            <hr>
            <select id="role">
                <option value="worker">Je propose mes services</option>
                <option value="poster">Je cherche un prestataire</option>
            </select>
            <textarea id="cv" placeholder="Présentez vos compétences ou votre besoin..."></textarea>
            <button onclick="saveProfile()" class="btn-save">Enregistrer le profil</button>
        </div>
    </div>

    <div id="businessScreen" class="screen-panel hidden">
        <div class="business-card">
            <h3>🚀 Booster votre visibilité</h3>
            <p>Apparaissez en priorité sur la carte et en haut de liste.</p>
            <button onclick="payBoost()" class="btn-boost">Activer le Mode Pro (1000 FCFA)</button>
        </div>
    </div>

    <div id="jobForm" class="job-modal hidden">
        <div class="modal-header">
            <h4>Publier une annonce</h4>
            <span onclick="toggleForm()">&times;</span>
        </div>
        <input id="title" placeholder="Quel est le métier ? (ex: Peintre)">
        <textarea id="desc" placeholder="Détails du travail..."></textarea>
        <input id="price" type="number" placeholder="Prix souhaité (FCFA)">
        <input id="phone" type="tel" placeholder="Numéro WhatsApp (6...)">
        <button onclick="addJob()" class="btn-submit">Mettre en ligne</button>
    </div>

    <div class="fab-main pulse" onclick="toggleForm()">+</div>

    <nav class="bottom-nav">
        <div class="nav-item" onclick="showScreen('jobs')">
            <i class="fas fa-list"></i>
            <span>Jobs</span>
        </div>
        <div class="nav-item active" onclick="showScreen('map')">
            <i class="fas fa-map-marked-alt"></i>
            <span>Carte</span>
        </div>
        <div class="nav-item" onclick="showScreen('account')">
            <i class="fas fa-user-circle"></i>
            <span>Compte</span>
        </div>
        <div class="nav-item" onclick="showScreen('business')">
            <i class="fas fa-briefcase"></i>
            <span>Business</span>
        </div>
    </nav>

    <script src="app.js"></script>
</body>
                                                                                   </html>

<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobMarket Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

</head>

<body>

<div id="map"></div>

<button class="fab" onclick="openForm()">+</button>

<div class="bottom-nav">
  <button onclick="centerMap()">📍<br>Carte</button>
  <button onclick="loadNearby()">📄<br>Jobs</button>
  <button onclick="openForm()">➕<br>Publier</button>
  <button onclick="showAccount()">👤<br>Compte</button>
</div>

<div id="formBox" class="form hidden">
  <input id="title" placeholder="Titre">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="Téléphone">
  <input type="file" id="image">
  <label><input type="checkbox" id="boost"> BOOST</label>
  <button onclick="addJob()">Publier</button>
</div>

<script src="app.js"></script>

</body>
  </html>

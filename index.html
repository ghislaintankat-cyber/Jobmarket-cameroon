<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JobMarket Pro Max</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://checkout.flutterwave.com/v3.js"></script>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture",
  storageBucket: "jobmarketfuture.firebasestorage.app",
  messagingSenderId: "351669024349",
  appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

window.db = db;
window.ref = ref;
window.push = push;
window.onValue = onValue;
</script>

</head>

<body onload="initMap()">

<!-- HEADER -->
<div class="header">
  <div class="user">G</div>
  <div class="title">JobMarket</div>
</div>

<!-- JOBS -->
<div id="jobsPage" class="page active"></div>

<!-- MAP -->
<div id="mapPage" class="page">
  <div id="map"></div>

  <button class="fab" onclick="openForm()">+</button>

  <div class="map-tools">
    <button onclick="centerUser()">📍</button>
  </div>
</div>

<!-- ACCOUNT -->
<div id="accountPage" class="page big-page">
  <h2>👤 Compte</h2>
  <input placeholder="Email">
  <input placeholder="Mot de passe">
  <button class="main-btn">Connexion</button>
</div>

<!-- BUSINESS -->
<div id="businessPage" class="page big-page">
  <h2>💰 Business</h2>

  <input id="aiInput" placeholder="Pose ta question...">
  <button class="main-btn" onclick="askAI()">🤖 IA</button>

  <div id="aiResponse"></div>
</div>

<!-- FORM -->
<div id="formBox" class="hidden">
  <h3>Créer un job</h3>
  <input id="title" placeholder="Nom / entreprise">
  <input id="desc" placeholder="Description">
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="WhatsApp">
  <button class="main-btn" onclick="addJob()">Publier</button>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <button onclick="showPage('jobsPage')">📄 Jobs</button>
  <button onclick="showPage('mapPage')">🗺️ Carte</button>
  <button onclick="showPage('accountPage')">👤 Compte</button>
  <button onclick="showPage('businessPage')">💰 Business</button>
</div>

<script src="app.js"></script>
</body>
    </html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JobMarket Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

<script src="https://checkout.flutterwave.com/v3.js"></script>
</head>

<body>

<div id="map"></div>

<button class="fab" onclick="openForm()">+</button>

<div id="formBox" class="hidden">
  <input id="title" placeholder="Nom du job">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="WhatsApp">

  <button onclick="addJob()">Publier</button>
</div>

<div class="bottom-nav">
  <button onclick="centerMap()">📍</button>
  <button onclick="askAI()">🤖</button>
  <button onclick="payBoost()">💰</button>
  <button onclick="loadJobs()">🔄</button>
</div>

<script src="app.js"></script>
</body>
  </html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMarket Cameroon</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; margin: 0; }
        h1 { text-align: center; color: #333; }
        #jobs-container { max-width: 500px; margin: 0 auto; }
        .job-card { 
            background: white; padding: 15px; margin-bottom: 15px; 
            border-radius: 10px; border: 1px solid #ddd; position: relative;
        }
        .boosted { border: 2.5px solid #FFD700; background-color: #fffef0; box-shadow: 0 4px 10px rgba(255,215,0,0.2); }
        .badge { 
            background: #FFD700; color: black; font-size: 10px; font-weight: bold;
            padding: 4px 10px; border-radius: 20px; position: absolute; top: 10px; right: 10px;
        }
        .btn-boost { 
            background: #e67e22; color: white; border: none; padding: 12px; 
            width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 10px;
        }
    </style>
</head>
<body>

    <h1>🇨🇲 JobMarket Cameroon</h1>
    <div id="jobs-container">Connexion au serveur...</div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            storageBucket: "jobmarketfuture.firebasestorage.app",
            messagingSenderId: "351669024349",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const container = document.getElementById('jobs-container');

        onValue(ref(db, 'jobs'), (snapshot) => {
            const data = snapshot.val();
            container.innerHTML = "";
            if (data) {
                let list = Object.keys(data).map(id => ({ id, ...data[id] }));
                list.sort((a, b) => (b.boosted === true) - (a.boosted === true));

                list.forEach(job => {
                    const div = document.createElement('div');
                    div.className = `job-card ${job.boosted ? 'boosted' : ''}`;
                    div.innerHTML = `
                        ${job.boosted ? '<span class="badge">⭐ EN VEDETTE</span>' : ''}
                        <h3>${job.title}</h3>
                        <p>${job.description}</p>
                        <p><b>Prix:</b> ${job.price || 'À discuter'} FCFA</p>
                        ${!job.boosted ? `<button class="btn-boost" onclick="lancerPaiement('${job.id}')">🚀 Booster (500 FCFA)</button>` : '<p style="color: #d4af37; text-align: center;">✅ Annonce déjà boostée</p>'}
                    `;
                    container.appendChild(div);
                });
            } else {
                container.innerHTML = "Aucune annonce disponible.";
            }
        });

        window.lancerPaiement = async function(jobId) {
            const email = prompt("Entrez votre email pour le reçu Flutterwave :");
            if (!email) return;

            try {
                // --- L'URL MISE À JOUR ICI ---
                const response = await fetch("https://jobmarket-backend-6gqm.onrender.com/pay", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ jobId, amount: 500, email })
                });

                const result = await response.json();
                
                if (result.status === "success" && result.data.link) {
                    window.location.href = result.data.link; 
                } else {
                    alert("Erreur serveur : " + (result.message || "Problème Flutterwave"));
                }
            } catch (err) {
                console.error(err);
                alert("Impossible de contacter le serveur. Vérifie ta connexion.");
            }
        };
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Pro</title>

<!-- LEAFLET CSS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif;}
body{background:#0f172a;color:#fff;}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:#111827;
    font-weight:bold;
}

/* MAP */
#map{
    height:75vh;
    width:100%;
    position:relative;
}

/* USER */
.user-card{
    position:absolute;
    top:10px;
    left:10px;
    background:#fff;
    color:#000;
    padding:10px;
    border-radius:20px;
    font-size:12px;
    z-index:1000;
}

/* DISTANCE */
.distance-box{
    position:absolute;
    bottom:100px;
    left:10px;
    background:#111827;
    padding:15px;
    border-radius:15px;
    width:200px;
    z-index:1000;
}

/* BUTTONS */
.controls{
    position:absolute;
    right:10px;
    bottom:100px;
    display:flex;
    flex-direction:column;
    gap:10px;
    z-index:1000;
}

.btn{
    width:50px;
    height:50px;
    border-radius:15px;
    background:#fff;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
}

/* ADD */
.add-btn{
    position:absolute;
    bottom:90px;
    right:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#f59e0b;
    color:#000;
    font-size:30px;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:1000;
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:10px;
}
</style>
</head>

<body>

<div class="header">
    JobMarket Pro v5 🌍
</div>

<div id="map">

    <div class="user-card">
        🟢 Connecté<br>user@gmail.com
    </div>

    <div class="distance-box">
        <b>Distance</b><br>0 km
    </div>

    <div class="controls">
        <div class="btn">🎯</div>
        <div class="btn">📏</div>
        <div class="btn">📍</div>
    </div>

    <div class="add-btn">+</div>

</div>

<div class="footer">
    <div>💼 Jobs</div>
    <div>🗺️ Carte</div>
    <div>👤 Compte</div>
</div>

<!-- LEAFLET JS -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

<script>
// ======================
// INITIALISATION
// ======================
const map = L.map('map').setView([3.848, 11.502], 13);

// ======================
// TYPES DE CARTES
// ======================

// Carte normale
const normal = L.tileLayer(
  'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
  { maxZoom: 19 }
);

// Satellite (approximation)
const satellite = L.tileLayer(
  'https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png',
  { maxZoom: 17 }
);

// Labels
const labels = L.tileLayer(
  'https://{s}.tile.openstreetmap.de/{z}/{x}/{y}.png',
  { maxZoom: 19, opacity: 0.6 }
);

// Hybride
const hybrid = L.layerGroup([satellite, labels]);

// Par défaut
normal.addTo(map);

// Switch
L.control.layers({
  "🗺️ Normal": normal,
  "🛰️ Satellite": satellite,
  "🌍 Hybride": hybrid
}).addTo(map);


// ======================
// GPS UTILISATEUR
// ======================
if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(position => {

        const lat = position.coords.latitude;
        const lng = position.coords.longitude;

        map.setView([lat, lng], 15);

        L.circleMarker([lat, lng], {
            radius:10,
            color:'#2563eb',
            fillColor:'#3b82f6',
            fillOpacity:1
        })
        .addTo(map)
        .bindPopup("📍 Vous êtes ici");

    }, () => {
        alert("GPS refusé");
    });
}
</script>

</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMarket Live - Cameroun 🇨🇲</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root { --dark: #0f172a; --cyan: #06b6d4; --gray: #334155; --green: #22c55e; --red: #ef4444; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; border-left: 1px solid var(--gray); border-right: 1px solid var(--gray); }
        header { padding: 15px; background: rgba(15, 23, 42, 0.95); text-align: center; border-bottom: 2px solid var(--cyan); z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        header h1 { margin: 0; font-size: 1.2rem; color: var(--cyan); letter-spacing: 1px; }
        #map { flex-grow: 1; z-index: 1; } 
        .footer { padding: 15px; background: var(--dark); z-index: 10; border-top: 1px solid var(--gray); }
        .btn { background: var(--cyan); color: var(--dark); border: none; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1rem; width: 100%; transition: 0.3s; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        #formModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; border-radius: 25px; width: 90%; max-width: 400px; padding: 25px; box-shadow: 0 15px-35px rgba(0,0,0,0.5); border: 1px solid var(--gray); }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--gray); color: white; padding: 12px; margin-bottom: 12px; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
        label { display: block; margin-bottom: 5px; color: var(--cyan); font-size: 0.8rem; font-weight: bold; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; margin-top: 10px; font-weight: bold; gap: 8px; }
    </style>
</head>
<body>
<div id="app">
    <header><h1>JOBMARKET CAMEROUN 🛰️</h1></header>
    <div id="map"></div>
    <div class="footer"><button class="btn" onclick="openPostModal()">🚀 PUBLIER UNE MISSION</button></div>
</div>

<div id="formModal">
    <div class="modal-content">
        <h2 style="color:var(--cyan); margin: 0 0 15px 0;">Nouvelle Annonce</h2>
        
        <label>TYPE DE JOB</label>
        <select id="mType">
            <option value="🛠️ Dépannage">🛠️ Dépannage / Bricolage</option>
            <option value="📦 Livraison">📦 Livraison / Transport</option>
            <option value="🧹 Ménage">🧹 Ménage / Service</option>
            <option value="💻 Informatique">💻 Informatique / Aide</option>
            <option value="✨ Autre">✨ Autre</option>
        </select>

        <label>VOTRE NOM</label>
        <input type="text" id="userName" placeholder="Ex: Jean-Marc">
        
        <label>NUMÉRO WHATSAPP (Ex: 699...)</label>
        <input type="number" id="userPhone" placeholder="6xxxxxxxx">

        <label>DESCRIPTION & PRIX</label>
        <textarea id="mDesc" rows="3" placeholder="Ex: Besoin d'un électricien, payé 5000 FCFA"></textarea>

        <button class="btn" id="publishBtn" onclick="publish()">PUBLIER MAINTENANT</button>
        <button class="btn" style="background:transparent; color:white; border: 1px solid var(--gray); margin-top:10px;" onclick="closePostModal()">ANNULER</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, update, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
    projectId: "jobmarketfuture",
    storageBucket: "jobmarketfuture.firebasestorage.app",
    messagingSenderId: "351669024349",
    appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const missionsRef = ref(db, 'missions');

  var map = L.map('map', {zoomControl: false}).setView([3.848, 11.502], 13);
  L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { maxZoom: 20, subdomains:['mt0','mt1','mt2','mt3'] }).addTo(map);

  let markers = {};

  window.openPostModal = () => document.getElementById('formModal').style.display='flex';
  window.closePostModal = () => { document.getElementById('formModal').style.display='none'; document.getElementById('publishBtn').disabled = false; };

  window.publish = function() {
    const type = document.getElementById('mType').value;
    const name = document.getElementById('userName').value || "Anonyme";
    const phone = document.getElementById('userPhone').value;
    const desc = document.getElementById('mDesc').value;

    if(!phone || !desc) return alert("Veuillez remplir le numéro et la description !");

    const btn = document.getElementById('publishBtn');
    btn.innerText = "LOCALISATION GPS..."; btn.disabled = true;

    map.locate({setView: true, maxZoom: 16, enableHighAccuracy: false, timeout: 30000});

    map.once('locationfound', (e) => {
        push(missionsRef, { type, name, phone, desc, lat: e.latlng.lat, lng: e.latlng.lng, timestamp: Date.now() })
        .then(() => { alert("🚀 Mission en ligne !"); closePostModal(); });
    });
    map.once('locationerror', (err) => { alert("Erreur GPS. Activez votre position."); btn.disabled = false; btn.innerText = "PUBLIER"; });
  };

  function createMarker(id, data) {
    if (markers[id]) map.removeLayer(markers[id]);
    
    const marker = L.circleMarker([data.lat, data.lng], { radius: 14, color: "white", weight: 3, fillColor: "#06b6d4", fillOpacity: 1 }).addTo(map);
    
    let popup = `
        <div style="color:black; min-width:180px; font-family:sans-serif;">
            <b style="font-size:1.1rem; color:#06b6d4;">${data.type}</b><br>
            <small>Par: <b>${data.name}</b></small><hr>
            <p style="margin:8px 0;">${data.desc}</p>
            <a href="https://wa.me/237${data.phone}?text=Bonjour ${data.name}, je vous contacte pour l'annonce: ${data.type}" class="wa-btn" target="_blank">💬 WHATSAPP</a>
            <button onclick="window.deleteMission('${id}')" style="background:transparent; color:#ef4444; border:none; margin-top:10px; cursor:pointer; font-size:0.7rem; width:100%;">🗑️ SUPPRIMER L'ANNONCE</button>
        </div>`;
    
    marker.bindPopup(popup);
    markers[id] = marker;
  }

  window.deleteMission = (id) => { if(confirm("Supprimer cette annonce ?")) remove(ref(db, `missions/${id}`)); };
  onChildAdded(missionsRef, (snap) => createMarker(snap.key, snap.val()));
  onChildRemoved(missionsRef, (snap) => { if(markers[snap.key]) { map.removeLayer(markers[snap.key]); delete markers[snap.key]; } });
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Cameroon 🇨🇲</title>

<style>
body{
  font-family: Arial;
  background:#0f172a;
  color:white;
  text-align:center;
  padding:20px;
}
button{
  background:#f59e0b;
  border:none;
  padding:15px;
  border-radius:10px;
  font-size:16px;
  margin-top:20px;
}
input{
  padding:10px;
  border-radius:8px;
  border:none;
  width:80%;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>JobMarket Cameroon 🚀</h1>

<input id="amount" placeholder="Montant (XAF)" />
<br>
<button onclick="payer()">Payer</button>

<script>
// 🔥 URL BACKEND (IMPORTANT)
const API = "https://jobmarket-backend-6gqm.onrender.com";

// 🚀 Fonction paiement
async function payer(){
  try{
    const amount = document.getElementById("amount").value;

    if(!amount){
      alert("Entre un montant");
      return;
    }

    const res = await fetch(API + "/payment", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ amount })
    });

    const data = await res.json();

    if(data.link){
      window.location.href = data.link;
    }else{
      alert("Erreur: " + JSON.stringify(data));
    }

  }catch(err){
    alert("Erreur réseau: " + err.message);
  }
}

// ⚠️ DEBUG ANDROID (TRÈS IMPORTANT)
window.onerror = function(message, source, lineno, colno, error) {
  alert("Erreur JS:\n" + message + "\nLigne: " + lineno);
};

window.addEventListener("unhandledrejection", function(event) {
  alert("Erreur Promise:\n" + event.reason);
});
</script>

</body>
</html>

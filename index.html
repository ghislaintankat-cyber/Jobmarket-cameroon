<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Pro</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f172a;
    color:#fff;
}

/* HEADER */
.header{
    padding:15px;
    text-align:center;
    background:#111827;
    font-weight:bold;
    font-size:18px;
}

.sub{
    font-size:12px;
    opacity:0.7;
    margin-top:5px;
}

/* MAP */
#map{
    height:75vh;
    width:100%;
    background:#1f2937;
    position:relative;
}

/* USER CARD */
.user-card{
    position:absolute;
    top:10px;
    left:10px;
    background:#fff;
    color:#000;
    padding:10px 15px;
    border-radius:20px;
    font-size:12px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* DISTANCE BOX */
.distance-box{
    position:absolute;
    bottom:100px;
    left:10px;
    background:#111827;
    padding:15px;
    border-radius:15px;
    width:200px;
    font-size:14px;
}

/* FLOAT BUTTONS */
.controls{
    position:absolute;
    right:10px;
    bottom:100px;
    display:flex;
    flex-direction:column;
    gap:10px;
}

.btn{
    width:50px;
    height:50px;
    border-radius:15px;
    background:#fff;
    color:#000;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:20px;
    box-shadow:0 5px 10px rgba(0,0,0,0.2);
}

/* ADD BUTTON */
.add-btn{
    position:absolute;
    bottom:90px;
    right:20px;
    width:65px;
    height:65px;
    border-radius:50%;
    background:#f59e0b;
    color:#000;
    font-size:35px;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

/* FOOTER */
.footer{
    position:fixed;
    bottom:0;
    width:100%;
    background:#111827;
    display:flex;
    justify-content:space-around;
    padding:10px 0;
    border-top:1px solid rgba(255,255,255,0.1);
}

.footer div{
    text-align:center;
    font-size:12px;
}
</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
    JobMarket Pro v2 🌍
    <div class="sub">Trouvez et publiez des services autour de vous</div>
</div>

<!-- MAP -->
<div id="map">

    <!-- USER -->
    <div class="user-card">
        🟢 Connecté<br>
        user@gmail.com
    </div>

    <!-- DISTANCE -->
    <div class="distance-box">
        <b>Distance</b><br>
        0 km
    </div>

    <!-- BUTTONS -->
    <div class="controls">
        <div class="btn">🎯</div>
        <div class="btn">📏</div>
        <div class="btn">📍</div>
    </div>

    <!-- ADD BUTTON -->
    <div class="add-btn">+</div>

</div>

<!-- FOOTER -->
<div class="footer">
    <div>💼<br>Jobs</div>
    <div>🗺️<br>Carte</div>
    <div>👤<br>Compte</div>
</div>

</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<div id="map"></div>

<div class="controls">
<button onclick="locateMe()">🎯</button>
<button onclick="toggleForm()">＋</button>
</div>

<div id="jobsList" class="hidden"></div>

<div id="formBox" class="hidden">
<input id="title" placeholder="Titre">
<input id="price" placeholder="Prix">
<input id="phone" placeholder="Téléphone">
<button onclick="addJob()">Publier</button>
</div>

<!-- ADMIN -->
<div id="adminPanel" class="hidden">
<h2>🛠 Admin Panel</h2>
<button onclick="loadAdminJobs()">📦 Jobs</button>
<button onclick="loadUsers()">👤 Utilisateurs</button>
<div id="adminContent"></div>
</div>

<button id="adminBtn" onclick="openAdmin()" class="hidden">⚙️</button>

<nav>
<button onclick="showMap()">Carte</button>
<button onclick="showList()">Publier</button>
</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="app.js"></script>

</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Ultra 🌍</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

    <style>
        :root { --gold:#f59e0b; --dark:#0f172a; }
        body, html { margin:0; height:100%; width:100%; overflow:hidden; font-family:sans-serif; background: #000; }
        
        /* FIX: Forcer l'affichage de la carte */
        #map { position:absolute; top:0; bottom:0; width:100%; z-index: 1; background: #111; }

        .btn {
            position:absolute; right:15px; width:45px; height:45px;
            background:white; border-radius:12px;
            display:flex; align-items:center; justify-content:center;
            box-shadow:0 4px 10px rgba(0,0,0,0.3);
            cursor:pointer; z-index:1000; font-size: 20px;
        }
        #gps { top:20px; }
        #mapType { top:75px; }
        #clear { top:130px; background:red; color:white; display:none; }

        #add {
            position:absolute; bottom:90px; right:20px;
            width:65px; height:65px; border-radius:50%;
            background:var(--gold); color:white; font-size:35px; border:none;
            z-index:1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .panel {
            position:fixed; bottom:-100%; left:0; width:100%;
            background:var(--dark); color:white; padding:20px;
            transition:.4s; z-index:2000; border-radius:20px 20px 0 0;
            box-sizing: border-box; border-top: 3px solid var(--gold);
        }
        .panel.active { bottom:0; }

        input, textarea {
            width:100%; padding:12px; margin:8px 0;
            background:#1e293b; border:1px solid #334155; color:white; border-radius:8px;
            box-sizing: border-box; font-size: 16px;
        }

        #routeBox {
            position:absolute; top:20px; left:50%;
            transform:translateX(-50%);
            background:rgba(0,0,0,0.8); color:white; padding:10px 20px;
            border-radius:30px; border:2px solid var(--gold);
            z-index:1000; display:none; font-weight: bold;
        }

        #bottomNav {
            position:absolute; bottom:0; width:100%;
            background:white; display:flex; height: 60px;
            justify-content:space-around; align-items: center;
            z-index:1000; border-top: 1px solid #ddd;
        }

        .nav-btn { text-align:center; font-size:12px; cursor:pointer; color: #666; }
    </style>
</head>
<body>

<div id="routeBox"></div>
<div id="map"></div>

<div id="gps" class="btn" onclick="centerUser()">🎯</div>
<div id="mapType" class="btn" onclick="toggleMap()">🛰️</div>
<div id="clear" class="btn" onclick="clearRoute()">❌</div>
<button id="add" onclick="togglePanel()">+</button>

<div id="panel" class="panel">
    <h3 style="margin:0; text-align:center; color:var(--gold)">Publier un Job</h3>
    <input id="title" placeholder="Métier (ex: Plombier)">
    <input id="phone" type="tel" placeholder="WhatsApp (ex: 699...)">
    <textarea id="desc" placeholder="Description courte"></textarea>
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; border:none; padding:15px; border-radius:10px; font-weight:bold;">PUBLIER</button>
    <p onclick="togglePanel()" style="text-align:center; color:gray; cursor:pointer;">Annuler</p>
</div>

<div id="bottomNav">
    <div class="nav-btn">🧳<br>Jobs</div>
    <div class="nav-btn">🗺️<br>Carte</div>
    <div class="nav-btn" onclick="alert('Bientôt disponible !')">💰<br>Business</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, normal, sat, userMarker, routeControl;
let userPos = null;
let mode = "normal";
let admin = false;
let clickCount = 0;

// INITIALISATION AU CHARGEMENT
window.onload = function() {
    // Créer la carte
    map = L.map('map', { zoomControl: false }).setView([3.86, 11.51], 13);
    
    normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

    // GPS
    navigator.geolocation.watchPosition(pos => {
        userPos = [pos.coords.latitude, pos.coords.longitude];
        if(!userMarker) {
            userMarker = L.circleMarker(userPos, {radius: 9, color: '#3b82f6', fillColor:'#3b82f6', fillOpacity: 1}).addTo(map);
        } else {
            userMarker.setLatLng(userPos);
        }
    }, err => console.error("GPS Error"), { enableHighAccuracy: true });

    // Charger les jobs
    loadJobs();
};

// ACTIONS
function centerUser() {
    if(userPos) map.setView(userPos, 16);
    else alert("Détection GPS en cours...");
}

function toggleMap() {
    if(mode === "normal") { map.removeLayer(normal); sat.addTo(map); mode = "sat"; }
    else { map.removeLayer(sat); normal.addTo(map); mode = "normal"; }
}

function togglePanel() {
    document.getElementById("panel").classList.toggle("active");
}

function publish() {
    let t = document.getElementById("title").value;
    let p = document.getElementById("phone").value;
    let d = document.getElementById("desc").value;

    if(!t || !p) return alert("Remplis les champs !");

    db.ref("jobs").push({
        title: t,
        phone: p.replace(/\D/g,''),
        desc: d,
        lat: map.getCenter().lat,
        lng: map.getCenter().lng,
        time: Date.now()
    }).then(() => {
        document.getElementById("title").value = "";
        document.getElementById("phone").value = "";
        document.getElementById("desc").value = "";
        togglePanel();
    });
}

function loadJobs() {
    db.ref("jobs").on("value", snap => {
        map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });

        snap.forEach(j => {
            let data = j.val();
            let marker = L.marker([data.lat, data.lng]).addTo(map);
            
            marker.bindPopup(`
                <div style="min-width:150px">
                    <b style="color:var(--gold); font-size:16px;">${data.title}</b><br>
                    <p>${data.desc || ""}</p>
                    <button onclick="startRoute(${data.lat}, ${data.lng})" style="width:100%; background:var(--gold); border:none; color:white; padding:8px; border-radius:5px; cursor:pointer;">🧭 Itinéraire</button>
                    <a href="https://wa.me/${data.phone}" target="_blank" style="display:block; text-align:center; background:#25D366; color:white; padding:8px; border-radius:5px; margin-top:5px; text-decoration:none;">WhatsApp</a>
                </div>
            `);
        });
    });
}

function startRoute(lat, lng) {
    if(!userPos) return alert("Position GPS introuvable");
    if(routeControl) map.removeControl(routeControl);

    routeControl = L.Routing.control({
        waypoints: [ L.latLng(userPos), L.latLng(lat, lng) ],
        createMarker: () => null,
        lineOptions: { styles: [{color: '#f59e0b', weight: 6}] }
    }).on('routesfound', e => {
        let r = e.routes.summary;
        let rb = document.getElementById("routeBox");
        rb.innerHTML = `${(r.totalDistance/1000).toFixed(1)} km | ${Math.round(r.totalTime/60)} min`;
        rb.style.display = "block";
        document.getElementById("clear").style.display = "flex";
    }).addTo(map);
    map.closePopup();
}

function clearRoute() {
    if(routeControl) map.removeControl(routeControl);
    document.getElementById("routeBox").style.display = "none";
    document.getElementById("clear").style.display = "none";
}

// ADMIN SECRET (5 clics sur le fond noir du panel par exemple)
document.getElementById("panel").addEventListener("click", () => {
    clickCount++;
    if(clickCount === 5) {
        let code = prompt("Code Admin :");
        if(code === "237BO") { admin = true; alert("ADMIN ACTIVÉ"); loadJobs(); }
        clickCount = 0;
    }
});
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Ultra 🌍</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

    <style>
        :root { --gold:#f59e0b; --dark:#0f172a; --green:#10b981; --wa:#25D366; --red:#ef4444; }
        body, html { margin:0; height:100%; width:100%; overflow:hidden; font-family:sans-serif; background: #000; }
        #map { position:absolute; top:0; bottom:0; width:100%; z-index: 1; }
        
        /* Boutons Flottants */
        .btn { position:absolute; right:15px; width:45px; height:45px; background:white; border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer; z-index:1000; font-size: 20px; border:none; }
        #gps { top:20px; }
        #mapType { top:75px; }
        #clear { top:130px; background:var(--red); color:white; display:none; }
        #add { position:absolute; bottom:90px; right:20px; width:65px; height:65px; border-radius:50%; background:var(--gold); color:white; font-size:35px; border:none; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }

        /* Panneaux Coulissants */
        .panel { position:fixed; bottom:-100%; left:0; width:100%; background:var(--dark); color:white; padding:20px; transition:.4s; z-index:2000; border-radius:25px 25px 0 0; box-sizing: border-box; border-top: 4px solid var(--gold); max-height: 85%; overflow-y: auto; }
        #businessPanel { border-top: 4px solid var(--green); }
        .panel.active { bottom:0; }

        input, textarea { width:100%; padding:14px; margin:8px 0; background:#1e293b; border:1px solid #334155; color:white; border-radius:10px; box-sizing: border-box; font-size: 16px; }
        .ai-msg { background:#1e293b; padding:15px; border-radius:12px; margin-top:15px; font-size:14px; line-height:1.6; border-left:5px solid var(--green); color: #e2e8f0; min-height: 40px; }

        /* Barre de navigation basse */
        #bottomNav { position:absolute; bottom:0; width:100%; background:white; display:flex; height: 70px; justify-content:space-around; align-items: center; z-index:1000; border-top: 1px solid #ddd; }
        .nav-btn { text-align:center; font-size:11px; cursor:pointer; color: #334155; font-weight: bold; flex:1; border:none; background:none; }
        
        .pop-btn { width:100%; border:none; padding:10px; border-radius:8px; margin-bottom:5px; cursor:pointer; font-weight:bold; color:white; display:block; text-align:center; text-decoration:none; font-size:12px; }
    </style>
</head>
<body>

<div id="map"></div>

<button id="gps" class="btn" onclick="centerUser()">🎯</button>
<button id="mapType" class="btn" onclick="toggleMap()">🛰️</button>
<button id="clear" class="btn" onclick="clearRoute()">❌</button>
<button id="add" onclick="togglePanel('panel')">+</button>

<div id="panel" class="panel">
    <h3 style="margin:0; text-align:center; color:var(--gold)">Publier un Job 🇨🇲</h3>
    <input id="title" placeholder="Métier (ex: Coiffeuse, Mécanicien)">
    <input id="phone" type="tel" placeholder="WhatsApp (ex: 6...)">
    <textarea id="desc" placeholder="Décrivez votre service et vos prix..."></textarea>
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; border:none; padding:16px; border-radius:12px; font-weight:bold;">AFFICHER SUR LA CARTE</button>
    <p onclick="togglePanel('panel')" style="text-align:center; color:gray; margin-top:15px; cursor:pointer;">Annuler</p>
</div>

<div id="businessPanel" class="panel">
    <h3 style="margin:0; text-align:center; color:var(--green)">💰 Coach Business IA</h3>
    <p style="font-size: 12px; text-align: center; color: #94a3b8;">Conseils personnalisés pour le marché camerounais.</p>
    <input id="ai-q" placeholder="Comment attirer plus de clients ?">
    <button onclick="askAI()" style="width:100%; background:var(--green); color:white; border:none; padding:14px; border-radius:10px; font-weight:bold;">DEMANDER À L'IA</button>
    <div id="ai-res" class="ai-msg">Écrivez votre question ci-dessus...</div>
    <p onclick="togglePanel('businessPanel')" style="text-align:center; color:gray; margin-top:20px; cursor:pointer;">Fermer</p>
</div>

<div id="bottomNav">
    <button class="nav-btn" onclick="togglePanel('panel')">🧳<br>POSTER</button>
    <button class="nav-btn" onclick="location.reload()">🗺️<br>CARTE</button>
    <button class="nav-btn" onclick="togglePanel('businessPanel')">💰<br>BUSINESS</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// CONFIG FIREBASE (Reste identique)
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, normal, sat, userMarker, routeControl, userPos = null;
let mode = "normal";

window.onload = function() {
    map = L.map('map', { zoomControl: false }).setView([3.86, 11.51], 13);
    normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
    
    // Géolocalisation temps réel
    navigator.geolocation.watchPosition(pos => {
        userPos = [pos.coords.latitude, pos.coords.longitude];
        if(!userMarker) userMarker = L.circleMarker(userPos, {radius: 10, color: '#3b82f6', fillColor:'#3b82f6', fillOpacity: 1}).addTo(map);
        else userMarker.setLatLng(userPos);
    }, null, { enableHighAccuracy: true });

    loadJobs();
};

function togglePanel(id) { document.getElementById(id).classList.toggle("active"); }

function publish() {
    let t = document.getElementById("title").value, p = document.getElementById("phone").value, d = document.getElementById("desc").value;
    if(!t || !p) return alert("Métier et WhatsApp obligatoires !");
    db.ref("jobs").push({ title: t, phone: p.replace(/\D/g,''), desc: d, lat: map.getCenter().lat, lng: map.getCenter().lng, time: Date.now(), stars: 0, votes: 0 });
    togglePanel('panel');
    alert("C'est en ligne !");
}

function loadJobs() {
    db.ref("jobs").on("value", snap => {
        map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
        snap.forEach(j => {
            let data = j.val(), key = j.key;
            let note = data.votes > 0 ? (data.stars / data.votes).toFixed(1) : "Nouveau";
            let marker = L.marker([data.lat, data.lng]).addTo(map);
            marker.bindPopup(`
                <div style="min-width:190px">
                    <b style="color:var(--gold); font-size:15px;">${data.title}</b> ⭐${note}<br>
                    <p style="font-size:13px; margin: 8px 0;">${data.desc}</p>
                    <button class="pop-btn" style="background:var(--gold)" onclick="startRoute(${data.lat},${data.lng})">🧭 TRACER CARTE</button>
                    <button class="pop-btn" style="background:var(--red)" onclick="openVoiceGPS(${data.lat},${data.lng})">🗣️ GPS VOCAL</button>
                    <a href="https://wa.me/${data.phone}" target="_blank" class="pop-btn" style="background:#25D366; text-decoration:none;">💬 WHATSAPP</a>
                    <button class="pop-btn" style="background:#eee; color:#333;" onclick="vote('${key}')">⭐ NOTER</button>
                </div>
            `);
        });
    });
}

function openVoiceGPS(lat, lng) {
    window.open(`https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}&travelmode=driving`, '_blank');
}

function vote(id) {
    let note = parseInt(prompt("Note de 1 à 5 étoiles :"));
    if(note >= 1 && note <= 5) {
        db.ref("jobs/"+id).transaction(j => {
            if(j) { j.stars = (j.stars || 0) + note; j.votes = (j.votes || 0) + 1; }
            return j;
        });
    }
}

// L'IA GÉNÉRATIVE SÉCURISÉE (CORRECTION JSON APPLIQUÉE)
async function askAI() {
    const q = document.getElementById("ai-q").value;
    const res = document.getElementById("ai-res");
    const métier = document.getElementById("title").value || "commerçant";

    if(!q) return;
    res.innerHTML = "🌀 Réflexion stratégique...";

    const apiKey = "AIzaSyA3nzl7y2EFN-ZPk_qKdSd5rP3DDp_IIKs"; 

    try {
        const response = await fetch(
            `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${apiKey}`,
            {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({
                    contents: [{
                        parts: [{
                            text: `Tu es un expert business à Yaoundé. L'utilisateur est un ${métier}. 
                                   Réponds en 2 phrases max. Donne des conseils concrets et des prix en FCFA. 
                                   Question : ${q}`
                        }]
                    }]
                })
            }
        );

        const data = await response.json();

        // Structure JSON robuste
        if (data.candidates && data.candidates.length > 0 && data.candidates.content) {
            res.innerHTML = "<b>💰 Conseil Expert :</b><br>" + data.candidates.content.parts.text;
        } else {
            res.innerHTML = "⚠️ Impossible d'obtenir un conseil. Réessaie.";
        }

    } catch (e) {
        res.innerHTML = "❌ Erreur de connexion internet.";
    }
}

function startRoute(lat, lng) {
    if(!userPos) return alert("Active ton GPS !");
    if(routeControl) map.removeControl(routeControl);
    routeControl = L.Routing.control({ 
        waypoints: [L.latLng(userPos), L.latLng(lat, lng)], 
        createMarker:()=>null,
        lineOptions:{styles:[{color:'#f59e0b', weight:5}]}
    }).addTo(map);
    document.getElementById("clear").style.display = "flex";
}

function clearRoute() { if(routeControl) map.removeControl(routeControl); document.getElementById("clear").style.display="none"; }
function toggleMap() { if(mode==="normal"){map.removeLayer(normal);sat.addTo(map);mode="sat";}else{map.removeLayer(sat);normal.addTo(map);mode="normal";}}
function centerUser() { if(userPos) map.setView(userPos, 16); }
</script>
</body>
</html>

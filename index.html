<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroun 🛰️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 3px solid #06b6d4; z-index: 1000; }
        #map { flex: 1; background: #111; width: 100%; height: 100%; }
        .footer { padding: 15px; background: #0f172a; z-index: 1000; }
        .btn { background: #06b6d4; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; }
        #formModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid #06b6d4; }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 8px; border: none; box-sizing: border-box; font-size: 16px; background: #0f172a; color: white; }
    </style>
</head>
<body>

<header><b>JOBMARKET CAMEROUN 🛰️</b></header>
<div id="map"></div>
<div class="footer">
    <button class="btn" onclick="document.getElementById('formModal').style.display='flex'">🚀 PUBLIER UNE MISSION ICI</button>
</div>

<div id="formModal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:#06b6d4;">Nouvelle Annonce</h3>
        <select id="mType">
            <option value="🛠️">🛠️ Dépannage</option>
            <option value="📦">📦 Livraison</option>
            <option value="🧹">🧹 Ménage / Service</option>
        </select>
        <input type="text" id="userName" placeholder="Ton nom">
        <input type="number" id="userPhone" placeholder="WhatsApp (ex: 699001122)">
        <textarea id="mDesc" placeholder="Description de la mission..."></textarea>
        <button class="btn" id="finalPubBtn" onclick="publier()">VALIDER LA PUBLICATION</button>
        <button class="btn" style="background:gray; margin-top:8px;" onclick="document.getElementById('formModal').style.display='none'">Annuler</button>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script>
    // 1. Initialisation sur Yaoundé (plus zoomé)
    var map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);
    
    // 2. Serveur Google (ultra-stable)
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);

    // 3. Fonction Publier
    window.publier = function() {
        const name = document.getElementById('userName').value;
        const phone = document.getElementById('userPhone').value;
        const type = document.getElementById('mType').value;
        const desc = document.getElementById('mDesc').value;

        if(!phone || !desc) return alert("⚠️ Remplis ton numéro et la description !");
        
        const btn = document.getElementById('finalPubBtn');
        btn.innerText = "🛰️ Localisation en cours...";
        btn.style.background = "orange";

        navigator.geolocation.getCurrentPosition(function(pos) {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            
            // On place le marqueur sur la carte
            const marker = L.marker([lat, lng]).addTo(map);
            marker.bindPopup(`<b>${type} - ${name}</b><br>${desc}<br><br><a href="https://wa.me/237${phone}" target="_blank" style="background:#25D366; color:white; padding:8px; border-radius:5px; text-decoration:none;">💬 WhatsApp</a>`).openPopup();
            
            map.setView([lat, lng], 15);
            document.getElementById('formModal').style.display='none';
            alert("✅ Mission publiée sur la carte !");
            
            // Reset du bouton
            btn.innerText = "VALIDER LA PUBLICATION";
            btn.style.background = "#06b6d4";
        }, function(err) {
            alert("❌ Erreur GPS : Vérifie que la localisation est activée sur ta tablette/téléphone !");
            btn.innerText = "VALIDER LA PUBLICATION";
            btn.style.background = "#06b6d4";
        }, { enableHighAccuracy: true });
    };
</script>
</body>
                                     </html>

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>JobMarket</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://checkout.flutterwave.com/v3.js"></script>
</head>

<body onload="initMap()">

<div id="map"></div>

<button class="fab" onclick="openForm()">+</button>

<div id="formBox" class="hidden">
  <input id="title" placeholder="Ex: Plomberie">
  <button onclick="autoAI()">⚡ IA</button>

  <textarea id="desc"></textarea>
  <input id="price">
  <input id="phone">

  <button onclick="addJob()">Publier</button>
</div>

<div class="bottom-nav">
  <button onclick="payBoost()">💰 Booster</button>
</div>

<script src="app.js"></script>
</body>
    </html>

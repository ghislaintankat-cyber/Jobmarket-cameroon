<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🇨🇲</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <style>
        :root { --gold:#f59e0b; --dark:#0f172a; --green:#10b981; --wa:#25D366; }
        body, html { margin:0; height:100%; width:100%; overflow:hidden; font-family:sans-serif; background: #000; }
        #map { position:absolute; top:0; bottom:70px; width:100%; z-index: 1; }
        .btn { position:absolute; right:15px; width:45px; height:45px; background:white; border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer; z-index:1000; border:none; font-size: 20px; }
        #gps { top:20px; }
        #add { position:absolute; bottom:90px; right:20px; width:65px; height:65px; border-radius:50%; background:var(--gold); color:white; font-size:35px; border:none; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        .panel { position:fixed; bottom:-100%; left:0; width:100%; background:var(--dark); color:white; padding:20px; transition:.4s; z-index:2000; border-radius:25px 25px 0 0; box-sizing: border-box; border-top: 4px solid var(--gold); max-height: 85%; overflow-y: auto; }
        .panel.active { bottom:0; }
        input, textarea { width:100%; padding:14px; margin:8px 0; background:#1e293b; border:1px solid #334155; color:white; border-radius:10px; box-sizing: border-box; font-size: 16px; }
        .ai-msg { background:#1e293b; padding:15px; border-radius:12px; margin-top:15px; font-size:14px; line-height:1.6; border-left:5px solid var(--green); color: #e2e8f0; min-height: 50px; }
        #bottomNav { position:absolute; bottom:0; width:100%; background:white; display:flex; height: 70px; justify-content:space-around; align-items: center; z-index:1000; border-top: 1px solid #ddd; }
        .nav-btn { text-align:center; font-size:11px; cursor:pointer; color: #334155; font-weight: bold; flex:1; border:none; background:none; }
    </style>
</head>
<body>

<div id="map"></div>
<button id="gps" class="btn" onclick="centerUser()">🎯</button>
<button id="add" onclick="togglePanel('panel')">+</button>

<div id="panel" class="panel">
    <h3 style="margin:0; text-align:center; color:var(--gold)">Publier un Job 🇨🇲</h3>
    <input id="title" placeholder="Métier (ex: Menuisier)">
    <input id="phone" type="tel" placeholder="WhatsApp (ex: 6...)">
    <textarea id="desc" placeholder="Services et tarifs..."></textarea>
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; border:none; padding:16px; border-radius:12px; font-weight:bold;">AFFICHER SUR LA CARTE</button>
</div>

<div id="businessPanel" class="panel" style="border-top-color: var(--green);">
    <h3 style="margin:0; text-align:center; color:var(--green)">💰 Coach Business Cameroun</h3>
    <input id="ai-q" placeholder="Ex: Business avec 20.000 FCFA ?">
    <button onclick="askAI()" style="width:100%; background:var(--green); color:white; border:none; padding:14px; border-radius:10px; font-weight:bold;">DEMANDER CONSEIL</button>
    <div id="ai-res" class="ai-msg">Posez votre question...</div>
    <p onclick="togglePanel()" style="text-align:center; color:gray; margin-top:20px; cursor:pointer;">Fermer</p>
</div>

<div id="bottomNav">
    <button class="nav-btn" onclick="togglePanel('panel')">🧳<br>POSTER</button>
    <button class="nav-btn" onclick="location.reload()">🗺️<br>CARTE</button>
    <button class="nav-btn" onclick="togglePanel('businessPanel')">💰<br>BUSINESS</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// --- CONFIG FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, userMarker, userPos = null;
let savedKey = ""; // Variable vide. La clé y sera stockée temporairement.

window.onload = function() {
    map = L.map('map', { zoomControl: false }).setView([3.86, 11.51], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if(!userMarker) {
                userMarker = L.circleMarker(userPos, {radius: 9, color: '#3b82f6', fillColor:'#3b82f6', fillOpacity: 1}).addTo(map);
                map.setView(userPos, 14);
            } else { userMarker.setLatLng(userPos); }
        }, null, { enableHighAccuracy: true });
    }
    loadJobs();
};

function togglePanel(id) { 
    document.getElementById('panel').classList.remove("active");
    document.getElementById('businessPanel').classList.remove("active");
    if(id) document.getElementById(id).classList.add("active"); 
}

function publish() {
    let t = document.getElementById("title").value, p = document.getElementById("phone").value, d = document.getElementById("desc").value;
    if(!t || !p || !userPos) return alert("Remplis tout et attends le GPS !");
    db.ref("jobs").push({ title: t, phone: p.replace(/\D/g,''), desc: d, lat: userPos, lng: userPos });
    togglePanel();
    alert("🚀 Job publié sur la carte !");
}

function loadJobs() {
    db.ref("jobs").on("value", snap => {
        map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
        snap.forEach(child => {
            let data = child.val();
            L.marker([data.lat, data.lng]).addTo(map).bindPopup(`<b>${data.title}</b><br>${data.desc}<br><br><a href="https://wa.me/${data.phone}" target="_blank" style="background:var(--wa); color:white; padding:10px; border-radius:8px; display:block; text-align:center; text-decoration:none; font-weight:bold;">WHATSAPP</a>`);
        });
    });
}

// --- LOGIQUE IA SÉCURISÉE ---
async function askAI() {
    const q = document.getElementById("ai-q").value;
    const res = document.getElementById("ai-res");
    if(!q) return;

    // C'est ici que la magie opère : si la clé n'est pas en mémoire, on la demande à l'utilisateur
    if (!savedKey) {
        savedKey = prompt("🔑 COLLER VOTRE CLÉ API GEMINI ICI :\n(Elle ne sera pas enregistrée sur GitHub)");
        if (!savedKey) return;
    }

    res.innerHTML = "⌛ Le coach analyse...";
    res.style.color = "#f59e0b";
    
    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${savedKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Expert business au Cameroun. Réponds court avec des prix en FCFA : " + q }] }]
            })
        });

        const data = await response.json();
        
        if (data.candidates) {
            res.innerHTML = "<b>💰 Conseil Expert :</b><br>" + data.candidates.content.parts.text;
            res.style.color = "white";
        } else {
            res.innerHTML = "⚠️ Ta clé est invalide ou bloquée. Rafraîchis la page pour en remettre une nouvelle.";
            savedKey = ""; // Réinitialise la clé pour la redemander
        }
    } catch (e) {
        res.innerHTML = "❌ Problème de réseau.";
    }
}

function centerUser() { if(userPos) map.setView(userPos, 16); }
</script>
</body>
</html>

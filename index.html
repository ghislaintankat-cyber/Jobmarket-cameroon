<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobMarket Pro 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="style.css">

</head>

<body>

<div id="map"></div>

<!-- HEADER -->
<div class="header">
  <h1>JobMarket Pro 🌍</h1>
  <p>Trouvez et publiez des services autour de vous</p>
</div>

<!-- USER -->
<div class="user-box">
  🟢 Connecté
</div>

<!-- NAVIGATION -->
<div class="bottom-nav">
  <button onclick="showJobs()">Jobs</button>
  <button onclick="showMap()">Carte</button>
  <button onclick="showAccount()">Compte</button>
</div>

<!-- FAB -->
<div class="fab" onclick="createJob()">+</div>

<!-- JOB LIST -->
<div id="jobsPanel" class="panel hidden"></div>

<!-- ACCOUNT -->
<div id="accountPanel" class="panel hidden">
  <button onclick="loginGoogle()">Connexion Google</button>
  <button onclick="becomeAdmin()">Mode Admin</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script type="module" src="app.js"></script>

</body>
  </html>

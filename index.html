<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMarket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css" />
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; height: 100vh; display: flex; flex-direction: column; }
        #map { flex: 1; background: #222; width: 100%; min-height: 300px; }
        header { padding: 15px; background: #111; text-align: center; border-bottom: 2px solid cyan; }
        .footer { padding: 20px; background: #111; }
        .btn { background: cyan; color: black; border: none; padding: 20px; border-radius: 10px; width: 100%; font-weight: bold; font-size: 18px; }
    </style>
</head>
<body>
    <header><b>JOBMARKET CAMEROUN 🛰️</b></header>
    <div id="map"></div>
    <div class="footer">
        <button class="btn" id="monBouton">🚀 PUBLIER MA POSITION ICI</button>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script>
    // Initialisation simple
    var map = L.map('map').setView([3.848, 11.502], 12);
    
    // Serveur de carte Google (le plus robuste)
    L.tileLayer('https://mt1.google.com/vt/lyrs=m&x={x}&y={y}&z={z}').addTo(map);

    // Correction du bouton pour les anciennes tablettes
    document.getElementById('monBouton').onclick = function() {
        alert("🛰️ Recherche GPS en cours... Regarde bien en haut de ton écran Archos !");
        
        navigator.geolocation.getCurrentPosition(function(pos) {
            var lat = pos.coords.latitude;
            var lng = pos.coords.longitude;
            L.marker([lat, lng]).addTo(map).bindPopup("Tu es ici !").openPopup();
            map.setView([lat, lng], 15);
            alert("✅ Trouvé !");
        }, function(err) {
            alert("❌ Erreur : Active le GPS dans les réglages de ta tablette Archos !");
        }, { enableHighAccuracy: true, timeout: 5000 });
    };
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

</head>

<body>

<div id="map"></div>

<div class="top">JobMarket Pro 🚀</div>

<!-- JOBS -->
<div id="jobsPanel" class="panel hidden"></div>

<!-- ACCOUNT -->
<div id="accountPanel" class="panel hidden">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button onclick="login()">Connexion</button>
<button onclick="register()">Créer compte</button>
<button onclick="googleLogin()">Google</button>

<select id="role">
<option value="worker">Chercher travail</option>
<option value="poster">Poster travail</option>
</select>

<textarea id="cv" placeholder="Ton CV..."></textarea>
<button onclick="saveCV()">Sauvegarder CV</button>

</div>

<!-- BUSINESS -->
<div id="businessPanel" class="panel hidden">
<h3>🚀 Business</h3>
<button onclick="boostJob()">Booster un job</button>
</div>

<!-- FORM -->
<div id="form" class="form hidden">
<input id="title" placeholder="Travail">
<textarea id="desc" placeholder="Description"></textarea>
<input id="price" placeholder="Prix">
<input id="phone" placeholder="Téléphone">
<input id="image" placeholder="Lien image">

<button onclick="askAI()">✨ AI</button>
<button onclick="addJob()">Publier</button>
</div>

<div class="fab" onclick="toggleForm()">+</div>

<!-- NAV -->
<div class="nav">
<button onclick="show('jobs')">Jobs</button>
<button onclick="show('map')">Carte</button>
<button onclick="show('account')">Compte</button>
<button onclick="show('business')">Business</button>
</div>

<script src="app.js"></script>
</body>
  </html>

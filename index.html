<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMarket Pro 🛰️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        :root { --dark: #0f172a; --cyan: #06b6d4; --gray: #334155; }
        body { margin: 0; background: var(--dark); color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100vh; max-width: 500px; margin: 0 auto; }
        header { padding: 10px; background: #0f172a; text-align: center; border-bottom: 2px solid var(--cyan); z-index: 1000; }
        .filter-bar { display: flex; overflow-x: auto; gap: 8px; padding: 10px; background: #1e293b; z-index: 1000; border-bottom: 1px solid var(--gray); }
        .filter-btn { background: var(--gray); border: none; color: white; padding: 6px 12px; border-radius: 20px; font-size: 0.8rem; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--cyan); color: var(--dark); font-weight: bold; }
        #map { flex-grow: 1; background: #111; z-index: 1; } 
        .footer { padding: 15px; background: var(--dark); border-top: 1px solid var(--gray); z-index: 1000; }
        .btn { background: var(--cyan); color: var(--dark); border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; }
        #formModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 2000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; border-radius: 25px; width: 90%; max-width: 400px; padding: 20px; }
        input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--gray); color: white; padding: 10px; margin-bottom: 10px; border-radius: 8px; box-sizing: border-box; }
        .custom-div-icon { background: none; border: none; }
        .marker-pin { width: 30px; height: 30px; border-radius: 50% 50% 50% 0; background: var(--cyan); position: absolute; transform: rotate(-45deg); left: 50%; top: 50%; margin: -15px 0 0 -15px; display: flex; align-items: center; justify-content: center; border: 2px solid white; box-shadow: 0 2px 5px rgba(0,0,0,0.5); }
        .marker-pin i { transform: rotate(45deg); color: var(--dark); font-size: 14px; }
        .wa-btn { background: #25d366; color: white; text-decoration: none; display: flex; align-items: center; justify-content: center; padding: 10px; border-radius: 8px; font-weight: bold; gap: 8px; margin-bottom: 5px; }
    </style>
</head>
<body>
<div id="app">
    <header><h1 style="margin:0; font-size:1rem;">JOBMARKET CAMEROUN PRO 🛰️</h1></header>
    <div class="filter-bar">
        <button class="filter-btn active" onclick="filterMissions('Tous', this)">Tous</button>
        <button class="filter-btn" onclick="filterMissions('🛠️ Dépannage', this)">🛠️ Dépannage</button>
        <button class="filter-btn" onclick="filterMissions('📦 Livraison', this)">📦 Livraison</button>
        <button class="filter-btn" onclick="filterMissions('🧹 Ménage', this)">🧹 Ménage</button>
    </div>
    <div id="map"></div>
    <div class="footer"><button class="btn" onclick="openPostModal()">🚀 PUBLIER UNE MISSION</button></div>
</div>

<div id="formModal">
    <div class="modal-content">
        <h3 style="margin:0 0 15px 0; color:var(--cyan);">Nouvelle Annonce</h3>
        <select id="mType">
            <option value="🛠️ Dépannage">🛠️ Dépannage</option>
            <option value="📦 Livraison">📦 Livraison</option>
            <option value="🧹 Ménage">🧹 Ménage</option>
            <option value="💻 Info">💻 Informatique</option>
            <option value="✨ Autre">✨ Autre</option>
        </select>
        <input type="text" id="userName" placeholder="Ton nom">
        <input type="number" id="userPhone" placeholder="WhatsApp (ex: 690...)">
        <textarea id="mDesc" rows="2" placeholder="Description & Prix"></textarea>
        <input type="password" id="delCode" placeholder="Code secret (pour supprimer)">
        <button class="btn" id="publishBtn" onclick="publish()">PUBLIER</button>
        <button class="btn" style="background:none; color:white; margin-top:5px;" onclick="closePostModal()">Annuler</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded, remove, onChildRemoved } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
    projectId: "jobmarketfuture",
    storageBucket: "jobmarketfuture.firebasestorage.app",
    messagingSenderId: "351669024349",
    appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const missionsRef = ref(db, 'missions');

  var map = L.map('map', {zoomControl: false, fadeAnimation: false}).setView([3.848, 11.502], 13);
  
  L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', {
      maxZoom: 20,
      attribution: 'Google Maps'
  }).addTo(map);

  setTimeout(() => { map.invalidateSize(); }, 800);

  let markers = {};
  const iconMap = { "🛠️ Dépannage": "fa-screwdriver-wrench", "📦 Livraison": "fa-truck", "🧹 Ménage": "fa-broom", "💻 Info": "fa-laptop-code", "✨ Autre": "fa-star" };

  window.openPostModal = () => document.getElementById('formModal').style.display='flex';
  window.closePostModal = () => document.getElementById('formModal').style.display='none';

  window.publish = function() {
    const data = {
        type: document.getElementById('mType').value,
        name: document.getElementById('userName').value || "Anonyme",
        phone: document.getElementById('userPhone').value,
        desc: document.getElementById('mDesc').value,
        code: document.getElementById('delCode').value,
        lat: 0, lng: 0
    };
    if(!data.phone || !data.desc || !data.code) return alert("Remplissez tout !");
    
    document.getElementById('publishBtn').innerText = "GPS...";
    map.locate({setView: true, maxZoom: 16});
    
    map.once('locationfound', (e) => {
        data.lat = e.latlng.lat; data.lng = e.latlng.lng;
        push(missionsRef, data).then(() => { alert("🚀 Publié !"); location.reload(); });
    });
  };

  function createMarker(id, data) {
    const iconClass = iconMap[data.type] || "fa-briefcase";
    const customIcon = L.divIcon({
        className: 'custom-div-icon',
        html: `<div class="marker-pin"><i class="fa-solid ${iconClass}"></i></div>`,
        iconSize:, 
        iconAnchor: 
    });
    const marker = L.marker([data.lat, data.lng], { icon: customIcon }).addTo(map);
    marker.bindPopup(`<div style="color:black; min-width:180px;"><b>${data.type}</b><br><small>Par: ${data.name}</small><hr>${data.desc}<br><br><a href="https://wa.me/237${data.phone}" class="wa-btn" target="_blank">💬 WhatsApp</a><br><button onclick="window.tryDelete('${id}', '${data.code}')" style="color:red; background:none; border:none; width:100%; font-size:0.7rem; cursor:pointer;">Supprimer</button></div>`);
    marker.category = data.type;
    markers[id] = marker;
  }

  window.tryDelete = (id, correctCode) => {
    const userCode = prompt("Code secret :");
    if(userCode === correctCode) { remove(ref(db, `missions/${id}`)); alert("Supprimé !"); } else { alert("Code incorrect !"); }
  };

  window.filterMissions = (cat, btn) => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    Object.values(markers).forEach(m => { (cat === 'Tous' || m.category === cat) ? map.addLayer(m) : map.removeLayer(m); });
  };

  onChildAdded(missionsRef, (snap) => createMarker(snap.key, snap.val()));
  onChildRemoved(missionsRef, (snap) => { if(markers[snap.key]) { map.removeLayer(markers[snap.key]); delete markers[snap.key]; } });
</script>
</body>
</html>

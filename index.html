<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Global 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; --card:#1e293b; }
body { margin:0; font-family:sans-serif; background:var(--dark); color:white; display:flex; flex-direction:column; height:100vh; overflow:hidden; }
header { padding:15px; background:var(--card); text-align:center; font-weight:900; border-bottom:2px solid var(--gold); cursor:pointer; }
#map { flex:1; }
#panel { padding:15px; background:var(--card); max-height:45vh; overflow:auto; }
input { width:100%; padding:10px; margin-bottom:8px; border-radius:6px; border:none; }
button { padding:10px; border:none; border-radius:6px; width:100%; margin-bottom:5px; font-weight:bold; cursor:pointer; }
.btn-main { background:var(--gold); color:black; }
.btn-publier { background:#22c55e; color:white; }
</style>
</head>

<body>

<header onclick="detectAdmin()">JOBMARKET GLOBAL 🌍</header>

<div id="panel">

<div id="auth-ui">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button class="btn-main" onclick="login()">Connexion</button>
<button class="btn-main" onclick="register()">S'inscrire</button>
</div>

<div id="publish-ui" style="display:none;">
<input id="title" placeholder="Métier / service">
<input id="desc" placeholder="Détails">
<input id="phone" placeholder="WhatsApp (ex: 2376...)">
<button class="btn-publier" onclick="publish()">📍 Publier</button>
<button onclick="logout()" style="background:red;color:white;">Déconnexion</button>
</div>

<button onclick="toggleMap()" class="btn-main">🛰️ / 🗺️ Carte</button>

</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>

// FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// ADMIN
const ADMIN_EMAIL = "ghislaintankat@gmail.com";
const ADMIN_CODE = "237BO";
let adminUnlocked = false;
let clickCount = 0;

// MAP
let map = L.map('map').setView([3.848,11.502], 6);

const normalMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const satelliteMap = L.layerGroup([
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')
]);

normalMap.addTo(map);
let currentMap = "normal";

// SWITCH MAP
function toggleMap(){
if(currentMap==="normal"){
map.removeLayer(normalMap);
satelliteMap.addTo(map);
currentMap="satellite";
}else{
map.removeLayer(satelliteMap);
normalMap.addTo(map);
currentMap="normal";
}
}

// 📍 GPS LIVE
let userPosition = null;
let userMarker;

navigator.geolocation.watchPosition(pos=>{
userPosition = [pos.coords.latitude, pos.coords.longitude];

if(userMarker) map.removeLayer(userMarker);

userMarker = L.marker(userPosition).addTo(map)
.bindPopup("📍 Vous êtes ici");

}, ()=>console.log("GPS refusé"));

// 📏 DISTANCE CLICK TOOL
let distancePoints = [];
let distanceLine;

map.on('click', e=>{
distancePoints.push(e.latlng);

if(distancePoints.length===2){
const d = map.distance(distancePoints[0], distancePoints[1]) / 1000;

if(distanceLine) map.removeLayer(distanceLine);

distanceLine = L.polyline(distancePoints,{color:'red'}).addTo(map);

alert("Distance : "+d.toFixed(2)+" km");
distancePoints=[];
}
});

// ADMIN SECRET
function detectAdmin(){
clickCount++;
if(clickCount===5){
const code=prompt("Code admin ?");
if(code===ADMIN_CODE){
adminUnlocked=true;
alert("Mode ADMIN activé");
}else alert("Faux code");
clickCount=0;
}
}

// AUTH
function login(){ auth.signInWithEmailAndPassword(email.value,password.value); }
function register(){ auth.createUserWithEmailAndPassword(email.value,password.value); }
function logout(){ auth.signOut(); }

auth.onAuthStateChanged(user=>{
document.getElementById('auth-ui').style.display = user?"none":"block";
document.getElementById('publish-ui').style.display = user?"block":"none";
});

// 📍 PUBLIER
function publish(){

const user = auth.currentUser;
if(!user) return alert("Connecte-toi");

if(!title.value || !phone.value) return alert("Champs obligatoires");

const cleanPhone = phone.value.replace(/\D/g,'');

const data = {
title: title.value,
desc: desc.value,
phone: cleanPhone,
lat: map.getCenter().lat,
lng: map.getCenter().lng,
time: Date.now(),
uid: user.uid,
owner: user.email
};

db.ref("jobs").push(data).then(()=>{

alert("Publié ! 🚀");

fetch("https://jobmarket-cameroon.onrender.com/job-created", {
method:"POST",
headers:{"Content-Type":"application/json"},
body: JSON.stringify(data)
}).catch(()=>console.log("Render off"));

});

title.value=""; desc.value=""; phone.value="";
}

// 🗺️ AFFICHAGE + MATCHING
db.ref("jobs").on("value", snap=>{

map.eachLayer(layer=>{
if(layer instanceof L.Marker && layer !== userMarker) map.removeLayer(layer);
});

snap.forEach(j=>{

let d = j.val();
let user = auth.currentUser;

// expiration
if(Date.now()-d.time > 30*24*60*60*1000){
db.ref("jobs/"+j.key).remove();
return;
}

let marker = L.marker([d.lat,d.lng]).addTo(map);

// 📏 DISTANCE INTELLIGENTE
let distanceText = "";
if(userPosition){
const dist = map.distance(userPosition,[d.lat,d.lng])/1000;
distanceText = "<br>📍 Distance: "+dist.toFixed(2)+" km";
}

// priorité visuelle si proche (<5km)
if(userPosition){
const dist = map.distance(userPosition,[d.lat,d.lng])/1000;
if(dist < 5){
marker.setIcon(new L.Icon.Default({className:'near-job'}));
}
}

let canDelete = user && (user.email===d.owner || user.email===ADMIN_EMAIL || adminUnlocked);

marker.bindPopup(`
<b>${d.title}</b><br>
${d.desc}
${distanceText}<br>
<a href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a><br>
${canDelete ? `<button onclick="deleteJob('${j.key}')">Supprimer</button>` : ""}
`);

});

});

// DELETE
function deleteJob(id){
if(confirm("Supprimer ?")) db.ref("jobs/"+id).remove();
}

</script>

</body>
</html>

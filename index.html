<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Job Market</title>

  <link rel="stylesheet" href="style.css">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

  <script type="module" src="app.js"></script>
</head>

<body>

<div id="map"></div>

<input id="search" placeholder="Rechercher...">

<button onclick="createJob()">➕ Ajouter</button>
<button onclick="goToUser()">📍 Ma position</button>

<div id="jobModal" class="modal">
  <div class="modal-content">

    <span id="closeModal">❌</span>

    <h2 id="jobTitle"></h2>
    <p id="jobDesc"></p>
    <p id="jobDistance"></p>
    <p id="jobRating"></p>

    <img id="jobPhoto" width="100%">

    <a id="callBtn">📞 Appeler</a>
    <a id="waBtn">💬 WhatsApp</a>

    <div id="reviews"></div>

  </div>
</div>

<div id="loader">Chargement...</div>

</body>
      </html>

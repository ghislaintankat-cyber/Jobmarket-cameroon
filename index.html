<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Pro | Cameroun</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFB800;
            --dark: #1A1C1E;
            --glass: rgba(255, 255, 255, 0.9);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Plus Jakarta Sans', sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; z-index: 1; }

        /* --- HEADER STYLE IMAGE --- */
        .header-info {
            position: absolute; top: 20px; left: 20px; z-index: 1000;
            background: var(--glass); padding: 12px 20px; border-radius: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px;
            backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.3);
        }
        .status-dot { width: 10px; height: 10px; background: #22C55E; border-radius: 50%; }

        /* --- CUSTOM PREMIUM POPUP (L'image exacte) --- */
        .leaflet-popup-content-wrapper { background: none; box-shadow: none; }
        .leaflet-popup-tip { display: none; }
        
        .premium-card {
            background: white; border-radius: 18px; padding: 12px;
            display: flex; align-items: center; gap: 12px; min-width: 220px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3); border: 1px solid #E2E8F0;
        }
        .card-icon {
            width: 45px; height: 45px; border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px; color: white;
        }
        .info-content b { display: block; font-size: 15px; color: #1A1C1E; }
        .info-content span { font-size: 12px; color: #64748B; }
        .card-stats { display: flex; align-items: center; gap: 5px; font-size: 11px; margin-top: 4px; font-weight: 700; }

        /* --- BOUTONS FLOTTANTS ACTION --- */
        .fab-container { position: absolute; bottom: 100px; right: 20px; z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .btn-fab {
            width: 55px; height: 55px; background: white; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.15); cursor: pointer; border: none; font-size: 20px;
        }
        .btn-main { background: var(--primary); color: #000; width: 70px; height: 70px; border-radius: 25px; font-size: 30px; }

        /* --- FORMULAIRE CACHÉ (CLEAN UI) --- */
        #post-form {
            position: absolute; bottom: -100%; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: white; z-index: 2000;
            padding: 25px; border-radius: 30px 30px 0 0; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 -10px 40px rgba(0,0,0,0.3);
        }
        #post-form.active { bottom: 0; }
        input, select { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #E2E8F0; border-radius: 15px; font-size: 16px; box-sizing: border-box; }
        .btn-submit { width: 100%; padding: 18px; background: var(--dark); color: white; border: none; border-radius: 15px; font-weight: 700; cursor: pointer; }

        /* --- NAVBAR BAS --- */
        .bottom-nav {
            position: absolute; bottom: 0; width: 100%; height: 70px; background: var(--glass);
            z-index: 1000; display: flex; justify-content: space-around; align-items: center;
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.3);
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; font-size: 11px; font-weight: 600; color: #64748B; text-decoration: none; }
        .nav-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div class="header-info">
        <div class="status-dot"></div>
        <span style="font-weight: 700; font-size: 13px;">Connecté • GhislainT@gmail.com</span>
    </div>

    <div class="fab-container">
        <button class="btn-fab">🛰️</button>
        <button class="btn-fab">🎯</button>
        <button class="btn-fab btn-main" onclick="toggleForm()">+</button>
    </div>

    <div id="post-form">
        <h2 style="margin: 0 0 20px 0; font-size: 22px;">Poster un besoin</h2>
        <select id="job-type">
            <option value="🔧">Besoin Maçon</option>
            <option value="⚡">Besoin Électricien</option>
            <option value="🚚">Besoin Livreur</option>
            <option value="🏠">Besoin Peintre</option>
        </select>
        <input type="text" id="job-title" placeholder="Titre (ex: Chantier à Bastos)">
        <input id="job-phone" type="tel" placeholder="Votre numéro WhatsApp">
        <button class="btn-submit" onclick="submitJob()">Publier maintenant</button>
        <button style="width:100%; background:none; border:none; margin-top:10px; color:#64748B; cursor:pointer;" onclick="toggleForm()">Annuler</button>
    </div>

    <nav class="bottom-nav">
        <a href="#" class="nav-item active">💼<br>Jobs</a>
        <a href="#" class="nav-item">🗺️<br>Carte</a>
        <a href="#" class="nav-item">👤<br>Compte</a>
    </nav>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            storageBucket: "jobmarketfuture.firebasestorage.app",
            messagingSenderId: "351669024349",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- CONFIGURATION CARTE SATELLITE (GOOGLE STYLE) ---
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([3.848, 11.502], 13);
        
        const googleSat = L.tileLayer('http://{s}.google.com/vt/lyrs=s,h&x={x}&y={y}&z={z}', {
            maxZoom: 20,
            subdomains:['mt0','mt1','mt2','mt3']
        }).addTo(map);

        let userLat, userLng;

        // Géolocalisation
        navigator.geolocation.watchPosition(pos => {
            userLat = pos.coords.latitude;
            userLng = pos.coords.longitude;
            L.circleMarker([userLat, userLng], { radius: 10, color: '#fff', weight: 3, fillColor: '#3b82f6', fillOpacity: 1 }).addTo(map);
        });

        // Toggle Form
        window.toggleForm = () => {
            document.getElementById('post-form').classList.toggle('active');
        };

        // Publier
        window.submitJob = () => {
            const type = document.getElementById('job-type').value;
            const title = document.getElementById('job-title').value;
            const phone = document.getElementById('job-phone').value;

            if(!userLat) return alert("Attendez la position GPS...");

            push(ref(db, 'jobs'), {
                type, title, phone,
                lat: userLat, lng: userLng,
                time: Date.now()
            });

            toggleForm();
            alert("Publié avec succès sur la carte !");
        };

        // Charger les Jobs (Génération dynamique des cartes premium)
        onValue(ref(db, 'jobs'), snapshot => {
            const data = snapshot.val();
            if(!data) return;

            map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

            Object.values(data).forEach(job => {
                const iconColor = job.type === '🔧' ? '#EF4444' : job.type === '⚡' ? '#F59E0B' : '#10B981';
                
                const customIcon = L.divIcon({
                    className: 'custom-div-icon',
                    html: `<div style="background:${iconColor}; width:12px; height:12px; border:3px solid white; border-radius:50%; box-shadow: 0 0 15px ${iconColor}"></div>`,
                    iconSize:, iconAnchor:
                });

                const marker = L.marker([job.lat, job.lng], { icon: customIcon }).addTo(map);
                
                const card = `
                    <div class="premium-card">
                        <div class="card-icon" style="background:${iconColor}">${job.type}</div>
                        <div class="info-content">
                            <b>${job.title}</b>
                            <span>Contact: ${job.phone}</span>
                            <div class="card-stats">⭐ 5.0 • 📍 ${getDist(job.lat, job.lng)} km</div>
                        </div>
                    </div>
                `;
                marker.bindPopup(card);
            });
        });

        function getDist(l1, ln1) {
            if(!userLat) return "...";
            const R = 6371;
            const dLat = (l1-userLat) * Math.PI/180;
            const dLon = (ln1-userLng) * Math.PI/180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(userLat*Math.PI/180) * Math.cos(l1*Math.PI/180) * Math.sin(dLon/2) * Math.sin(dLon/2);
            return (R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a))).toFixed(1);
        }
    </script>
</body>
    </html>

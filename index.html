<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket CM</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://cdn.jsdelivr.net/npm/leaflet@1.7.1/dist/leaflet.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #f59e0b; --dark: #0f172a; }
        
        /* On force la taille de l'écran à 100% */
        html, body { 
            margin: 0; padding: 0; 
            height: 100%; width: 100%; 
            background: #000; overflow: hidden; 
        }
        
        body { display: flex; flex-direction: column; font-family: sans-serif; }

        header { 
            background: #1e293b; color: white; padding: 15px; 
            text-align: center; border-bottom: 2px solid var(--gold); 
            z-index: 9999; font-weight: bold;
        }

        /* ZONE DE LA CARTE - On force l'affichage */
        #map { 
            width: 100vw; 
            height: 80vh; /* Hauteur forcée pour le test */
            background: #222; 
            position: relative;
            z-index: 10;
        }

        .btn-float { 
            position: fixed; bottom: 20px; right: 20px; left: 20px; 
            background: var(--gold); color: #000; border: none; 
            height: 50px; border-radius: 25px; font-weight: bold; 
            z-index: 5000; cursor: pointer;
        }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center; color: white; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 80%; border: 1px solid var(--gold); }
        input, select, textarea { width: 100%; margin-bottom: 10px; padding: 10px; border-radius: 5px; }
    </style>
</head>
<body>

    <header>JOBMARKET CAMEROON 🛰️</header>

    <div id="map"></div>
    
    <button class="btn-float" onclick="demarrerGPS()">📍 PUBLIER (CLIQUE ICI)</button>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3>Nouveau Job ✨</h3>
            <select id="mType">
                <option value="🛠️ Dépannage">🛠️ Dépannage</option>
                <option value="📦 Livraison">📦 Livraison</option>
            </select>
            <input type="number" id="uPhone" placeholder="WhatsApp">
            <textarea id="mDesc" placeholder="Description"></textarea>
            <button onclick="envoyerFirebase()" style="width:100%; padding:15px; background:var(--gold); border:none; font-weight:bold;">VALIDER</button>
            <button onclick="document.getElementById('pubModal').style.display='none'" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map, tempCoords;

        // Fonction pour lancer la carte
        function startApp() {
            console.log("Démarrage de la carte...");
            
            // On crée la carte
            map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);

            // On utilise une carte "Plan" simple pour tester si ça vient du satellite
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

            // On force le rafraîchissement
            setTimeout(() => { map.invalidateSize(); }, 500);

            map.on('click', function(e) {
                tempCoords = e.latlng;
                document.getElementById('pubModal').style.display = 'flex';
            });

            // Charger les points
            db.ref('missions').on('child_added', (snap) => {
                const m = snap.val();
                L.marker([m.lat, m.lng]).addTo(map).bindPopup(m.type);
            });
        }

        function demarrerGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                tempCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.flyTo([tempCoords.lat, tempCoords.lng], 17);
                setTimeout(() => { document.getElementById('pubModal').style.display = 'flex'; }, 1000);
            }, () => { alert("Activez le GPS"); });
        }

        function envoyerFirebase() {
            const data = {
                type: document.getElementById('mType').value,
                phone: document.getElementById('uPhone').value,
                desc: document.getElementById('mDesc').value,
                lat: tempCoords.lat, lng: tempCoords.lng
            };
            db.ref('missions').push(data).then(() => {
                alert("Publié !");
                document.getElementById('pubModal').style.display='none';
            });
        }

        // LANCEMENT
        window.onload = startApp;
    </script>
</body>
                                                                                    </html>

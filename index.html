<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JobMarket Cameroon 🇨🇲</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; --green:#10b981; --wa:#25D366; }

body, html { margin:0; height:100%; overflow:hidden; font-family:sans-serif; background:#f1f5f9; }

#map { position:absolute; top:0; bottom:70px; width:100%; z-index:1; }

/* Boutons Flottants */
.btn { 
    position:absolute; right:15px; width:50px; height:50px; background:white; 
    border-radius:15px; display:flex; align-items:center; justify-content:center; 
    box-shadow:0 4px 15px rgba(0,0,0,0.2); z-index:1000; border:none; font-size:22px; cursor:pointer; 
}
#gps { top:20px; }
#layerBtn { top:85px; }
#add { 
    position:absolute; bottom:90px; right:20px; width:70px; height:70px; 
    border-radius:50%; background:var(--gold); color:white; font-size:40px; 
    border:none; z-index:1000; box-shadow: 0 6px 20px rgba(245, 158, 11, 0.4); 
}

/* Style des Labels Permanents (Effet Airbnb) */
.job-label {
    background: white;
    border: 2px solid var(--gold);
    border-radius: 8px;
    padding: 2px 8px;
    font-weight: bold;
    font-size: 11px;
    color: var(--dark);
    box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    white-space: nowrap;
}

/* Panel */
.panel { 
    position:fixed; bottom:-100%; width:100%; background:var(--dark); 
    color:white; padding:25px; transition:0.4s cubic-bezier(0.4, 0, 0.2, 1); 
    z-index:2000; border-radius:30px 30px 0 0; box-sizing: border-box;
}
.panel.active { bottom:0; }

input, textarea, select { 
    width:100%; padding:15px; margin:10px 0; background:#1e293b; 
    border:1px solid #334155; color:white; border-radius:12px; font-size:16px; 
}

/* Nav Basse */
#bottomNav { 
    position:absolute; bottom:0; width:100%; background:white; 
    display:flex; height:70px; border-top:1px solid #e2e8f0; z-index:1000; 
}
.nav-btn { flex:1; border:none; background:none; font-weight:bold; color:#64748b; font-size:11px; }
.nav-btn.active { color:var(--gold); }
</style>
</head>

<body>

<div id="map"></div>

<button id="gps" class="btn" onclick="centerUser()">🎯</button>
<button id="layerBtn" class="btn" onclick="switchMap()">🛰️</button>
<button id="add" onclick="togglePanel('panel')">+</button>

<div id="panel" class="panel">
    <h3 style="text-align:center; color:var(--gold); margin:0 0 20px 0;">Proposer vos services 🇨🇲</h3>
    <input id="title" placeholder="Quel est votre métier ?">
    <input id="phone" type="tel" placeholder="Numéro WhatsApp (ex: 6...)">
    
    <select id="category">
        <option value="autre">Choisir une catégorie</option>
        <option value="construction">🔨 Construction / BTP</option>
        <option value="beaute">💇 Beauté / Coiffure</option>
        <option value="transport">🚗 Transport / Livreur</option>
        <option value="tech">💻 Informatique / Tech</option>
    </select>
    
    <textarea id="desc" rows="2" placeholder="Description courte..."></textarea>
    
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; padding:18px; border:none; border-radius:15px; font-weight:bold; font-size:16px;">
        PUBLIER SUR LA CARTE
    </button>
    <p onclick="togglePanel()" style="text-align:center; color:#94a3b8; margin-top:15px; cursor:pointer;">Fermer</p>
</div>

<div id="bottomNav">
    <button class="nav-btn" onclick="togglePanel('panel')">🧳<br>POSTER</button>
    <button class="nav-btn active" onclick="centerUser()">🗺️<br>EXPLORER</button>
    <button class="nav-btn" onclick="alert('Coach Business IA bientôt de retour !')">💰<br>CONSEILS</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// --- FIREBASE ---
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, userMarker, userPos = null;
let streetLayer, satelliteLayer;
let currentLayer = "street";

window.onload = function() {
    map = L.map('map', { zoomControl: false }).setView([3.86, 11.51], 13);

    streetLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
    satelliteLayer = L.tileLayer('https://{s}.google.com/vt/lyrs=y&x={x}&y={y}&z={z}', { subdomains:['mt0','mt1','mt2','mt3'] });

    if(navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if(!userMarker) {
                userMarker = L.circleMarker(userPos, {radius:10, color:'#3b82f6', fillColor:'#3b82f6', fillOpacity:1}).addTo(map);
                map.setView(userPos, 15);
            } else { userMarker.setLatLng(userPos); }
        }, null, {enableHighAccuracy: true});
    }
    loadJobs();
};

function switchMap() {
    if(currentLayer === "street") { map.removeLayer(streetLayer); satelliteLayer.addTo(map); currentLayer = "satellite"; }
    else { map.removeLayer(satelliteLayer); streetLayer.addTo(map); currentLayer = "street"; }
}

function togglePanel(id) {
    document.getElementById('panel').classList.remove("active");
    if(id) document.getElementById(id).classList.add("active");
}

function publish() {
    const t = document.getElementById("title").value;
    const p = document.getElementById("phone").value;
    const d = document.getElementById("desc").value;
    const c = document.getElementById("category").value;

    if(!t || !p || !userPos) return alert("Position GPS ou infos manquantes !");

    // FIX 1 : Correction du stockage Lat/Lng (userPos et userPos)
    db.ref("jobs").push({
        title: t,
        phone: p.replace(/\D/g,''),
        desc: d,
        category: c,
        lat: userPos, 
        lng: userPos,
        timestamp: Date.now()
    }).then(() => {
        alert("Annonce publiée !");
        togglePanel();
        document.getElementById("title").value = "";
        document.getElementById("phone").value = "";
    });
}

function getIcon(cat) {
    let url = "https://cdn-icons-png.flaticon.com/512/565/565547.png";
    if(cat==="construction") url="https://cdn-icons-png.flaticon.com/512/3062/3062634.png";
    if(cat==="beaute") url="https://cdn-icons-png.flaticon.com/512/3135/3135715.png";
    if(cat==="transport") url="https://cdn-icons-png.flaticon.com/512/744/744465.png";
    if(cat==="tech") url="https://cdn-icons-png.flaticon.com/512/1006/1006363.png";

    // FIX 2 : iconSize et iconAnchor corrigés
    return L.icon({ iconUrl: url, iconSize:, iconAnchor:, popupAnchor: [0, -35] });
}

function loadJobs() {
    db.ref("jobs").on("value", snap => {
        // Nettoyage intelligent des markers uniquement
        map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });

        snap.forEach(child => {
            const data = child.val();
            
            // CRÉATION DU MARKER
            const marker = L.marker([data.lat, data.lng], { icon: getIcon(data.category) }).addTo(map);
            
            // FIX 6 : LE LABEL WAOUH (Affiche le métier directement)
            marker.bindTooltip(data.title, { 
                permanent: true, 
                direction: 'top', 
                className: 'job-label',
                offset: [0, -35]
            }).openTooltip();

            marker.bindPopup(`
                <div style="text-align:center;">
                    <b style="font-size:16px;">${data.title}</b><br>
                    <p style="margin:5px 0; color:#64748b;">${data.desc}</p>
                    <a href="https://wa.me/${data.phone}" target="_blank" 
                       style="background:var(--wa); color:white; padding:10px; border-radius:8px; display:block; text-decoration:none; font-weight:bold; margin-top:10px;">
                       CONTACTER SUR WHATSAPP
                    </a>
                </div>
            `);
        });
    });
}

function centerUser() { 
    if(userPos) map.setView(userPos, 16); 
    else alert("Recherche de votre position GPS...");
}
</script>
</body>
</html>

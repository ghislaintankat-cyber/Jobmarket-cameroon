<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🛰️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.css" />
    <script src="https://unpkg.com/leaflet-control-geocoder/dist/Control.Geocoder.js"></script>
    
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #f59e0b; --dark: #0f172a; --dark-light: #1e293b; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: var(--dark); font-family: sans-serif; color: white; overflow: hidden; }
        header { background: var(--dark-light); padding: 12px; text-align: center; border-bottom: 2px solid var(--gold); position: relative; }
        
        #map { flex-grow: 1; width: 100%; height: 100%; }

        /* Bouton Aide */
        .btn-aid { position: absolute; right: 10px; top: 10px; background: var(--gold); border: none; border-radius: 50%; width: 30px; height: 30px; font-weight: bold; cursor: pointer; color: #0f172a; }

        .btn-float { position: fixed; bottom: 20px; right: 20px; left: 20px; background: var(--gold); color: #0f172a; border: none; height: 50px; border-radius: 25px; font-weight: bold; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--dark-light); padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid var(--gold); position: relative; }
        
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: var(--dark); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-wa { background: #25D366; color: white; padding: 10px; display: block; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        .custom-icon { display: flex; justify-content: center; align-items: center; font-size: 20px; background: white; border-radius: 50%; border: 2px solid var(--gold); width: 30px; height: 30px; color: black; }
        
        /* Style pour la barre de recherche sur la carte */
        .leaflet-control-geocoder { border-radius: 20px; border: 2px solid var(--gold) !important; background: var(--dark-light) !important; }
        .leaflet-control-geocoder-icon { filter: invert(1); }
        .leaflet-control-geocoder-form input { color: white !important; }
    </style>
</head>
<body>

    <header>
        <b>JOBMARKET CAMEROON 🛰️</b>
        <button class="btn-aid" onclick="alert('Cliquez n\'importe où sur la carte ou utilisez le bouton GPS pour publier une annonce !')">?</button>
    </header>

    <div id="map"></div>
    
    <button class="btn-float" onclick="useGPS()">📍 UTILISER MON GPS</button>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--gold)">Publier ici ✨</h3>
            <select id="mType">
                <option value="🏊 Nageur">🏊 Maître-Nageur</option>
                <option value="🛠️ Dépannage">🛠️ Dépannage</option>
                <option value="📦 Livraison">📦 Livraison</option>
                <option value="🧹 Ménage">🧹 Ménage</option>
            </select>
            <input type="text" id="userName" placeholder="Ton nom">
            <input type="number" id="userPhone" placeholder="WhatsApp (ex: 695...)">
            <textarea id="mDesc" rows="3" placeholder="Description du job..."></textarea>
            <button class="btn-float" style="position:static; width:100%" onclick="finaliserPublication()">VALIDER</button>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script>
        // Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Initialisation Carte
        var map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // AJOUT DE LA BARRE DE RECHERCHE D'ADRESSE (Geocoder)
        const geocoder = L.Control.geocoder({
            defaultMarkGeocode: false,
            placeholder: "Chercher un quartier...",
            errorMessage: "Lieu introuvable"
        })
        .on('markgeocode', function(e) {
            var bbox = e.geocode.bbox;
            var poly = L.polygon([
                bbox.getSouthEast(), bbox.getNorthEast(), bbox.getNorthWest(), bbox.getSouthWest()
            ]);
            map.fitBounds(poly.getBounds());
        })
        .addTo(map);

        let tempCoords = null;

        // Icônes
        function getEmoji(type) {
            if(type.includes("Nageur")) return "🏊";
            if(type.includes("Dépannage")) return "🛠️";
            if(type.includes("Livraison")) return "📦";
            return "💼";
        }

        // Charger les données
        db.ref('missions').on('child_added', (snap) => {
            const m = snap.val();
            const icon = L.divIcon({
                className: 'custom-icon',
                html: `<div>${getEmoji(m.type)}</div>`,
                iconSize:
            });
            L.marker([m.lat, m.lng], {icon: icon}).addTo(map)
                .bindPopup(`<b>${m.type}</b><br>👤 ${m.name}<hr>${m.desc}<br><a href="https://wa.me/237${m.phone}" class="btn-wa">💬 WhatsApp</a>`);
        });

        // Clic sur carte
        map.on('click', (e) => { 
            tempCoords = e.latlng; 
            document.getElementById('pubModal').style.display = 'flex'; 
        });

        window.closeModal = () => { document.getElementById('pubModal').style.display = 'none'; };

        // GPS
        window.useGPS = () => {
            if (!navigator.geolocation) return alert("GPS non supporté");
            navigator.geolocation.getCurrentPosition(p => {
                const lat = p.coords.latitude;
                const lng = p.coords.longitude;
                map.flyTo([lat, lng], 16);
                tempCoords = {lat: lat, lng: lng};
                alert("Position GPS trouvée !");
                document.getElementById('pubModal').style.display = 'flex';
            }, () => alert("Activez votre localisation !"), {enableHighAccuracy: true});
        };

        // Envoi Final
        window.finaliserPublication = () => {
            const data = {
                type: document.getElementById('mType').value,
                name: document.getElementById('userName').value || "Anonyme",
                phone: document.getElementById('userPhone').value,
                desc: document.getElementById('mDesc').value,
                lat: tempCoords.lat, lng: tempCoords.lng
            };
            if(!data.phone || !data.desc) return alert("Veuillez remplir le numéro et la description !");
            db.ref('missions').push(data).then(() => {
                closeModal();
            });
        };

        // Correction affichage mobile
        setTimeout(() => { map.invalidateSize(); }, 1000);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Cameroon 🛰️</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css"/>

<style>
:root { --gold:#f59e0b; }
html,body{margin:0;height:100%;background:#000;font-family:sans-serif;}
body{display:flex;flex-direction:column;}
header{background:#1e293b;color:#fff;padding:15px;text-align:center;border-bottom:2px solid var(--gold);}
#map{flex:1;}
#filterType{position:fixed;top:70px;left:10px;z-index:2000;padding:10px;border-radius:10px;background:#1e293b;color:white;border:1px solid var(--gold);}
.btn-float{position:fixed;bottom:20px;left:20px;right:20px;background:var(--gold);border:none;height:55px;border-radius:30px;font-weight:bold;}
.modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.9);z-index:3000;justify-content:center;align-items:center;}
.modal-content{background:#1e293b;padding:20px;border-radius:15px;width:90%;max-width:350px;color:white;}
input,select,textarea{width:100%;margin-bottom:10px;padding:12px;border-radius:8px;border:none;background:#0f172a;color:white;}
.btn-send{background:var(--gold);border:none;padding:15px;width:100%;border-radius:8px;font-weight:bold;}
.custom-icon{display:flex;justify-content:center;align-items:center;background:white;border:2px solid var(--gold);border-radius:50%;width:35px;height:35px;font-size:16px;}
.btn-del{background:#ef4444;color:white;border:none;padding:5px 10px;border-radius:5px;margin-top:10px;}
</style>
</head>

<body>

<header>JOBMARKET CAMEROON 🛰️</header>

<select id="filterType" onchange="afficherJobs()">
<option value="all">🔍 Tous les services</option>
<option value="🏊 Maître-Nageur">🏊 Maître-Nageur</option>
<option value="🛠️ Dépannage">🛠️ Dépannage</option>
<option value="📦 Livraison">📦 Livraison</option>
<option value="🧹 Ménage">🧹 Ménage</option>
</select>

<div id="map"></div>

<button class="btn-float" onclick="demarrerGPS()">📍 PUBLIER ICI</button>

<div id="pubModal" class="modal">
<div class="modal-content">
<h3 style="color:var(--gold)">Nouveau Job ✨</h3>

<select id="mType">
<option value="🏊 Maître-Nageur">🏊 Maître-Nageur</option>
<option value="🛠️ Dépannage">🛠️ Dépannage</option>
<option value="📦 Livraison">📦 Livraison</option>
<option value="🧹 Ménage">🧹 Ménage</option>
</select>

<input id="uName" placeholder="Nom">
<input id="uPhone" placeholder="WhatsApp">
<textarea id="mDesc" placeholder="Description"></textarea>

<button class="btn-send" onclick="envoyerFirebase()">VALIDER</button>
<button onclick="fermerModal()" style="background:none;border:none;color:gray;width:100%;">Annuler</button>

</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
apiKey:"AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
authDomain:"jobmarketfuture.firebaseapp.com",
databaseURL:"https://jobmarketfuture-default-rtdb.firebaseio.com",
projectId:"jobmarketfuture",
appId:"1:351669024349:web:d4d4d08727ccc6012b7fb4"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, tempCoords, tempMarker;
let markers=[];
let missionsData=[];

window.onload=()=>{

map=L.map('map',{zoomControl:false}).setView([3.848,11.502],13);

// MAP
const satellite = L.layerGroup([
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')
]);

const streets = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
const dark = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');

satellite.addTo(map);

L.control.layers({
"🛰️ Satellite": satellite,
"🗺️ Standard": streets,
"🌙 Dark": dark
}).addTo(map);

// CLICK
map.on('click',e=>{
tempCoords=e.latlng;
if(tempMarker) map.removeLayer(tempMarker);
tempMarker=L.marker(tempCoords).addTo(map);
ouvrirModal();
});

// DATA
db.ref('missions').on('value',snap=>{
missionsData=[];
snap.forEach(child=>{
missionsData.push({...child.val(), id:child.key});
});
afficherJobs();
});

};

// UI
function ouvrirModal(){
document.getElementById('pubModal').style.display='flex';
}

function fermerModal(){
document.getElementById('pubModal').style.display='none';
}

// AFFICHAGE
function afficherJobs(){

markers.forEach(m=>map.removeLayer(m));
markers=[];

const filter=document.getElementById('filterType').value;
const unMois=30*24*60*60*1000;

missionsData.forEach(m=>{

if(Date.now()-m.time>unMois) return;
if(filter!=='all' && m.type!==filter) return;

// ✅ FIX BUG ICI
const icon=L.divIcon({
html:m.type.split(' ')[0],
className:'custom-icon',
iconSize:[35,35]
});

const marker=L.marker([m.lat,m.lng],{icon}).addTo(map)
.bindPopup(`
<div style="color:black;text-align:center;">
<b>${m.type}</b><br>
👤 ${m.name}<br>
<p>${m.desc}</p>

<a href="https://wa.me/237${m.phone}" target="_blank">WhatsApp</a><br>

<button class="btn-del" onclick="supprimerJob('${m.id}','${m.deleteCode}')">❌ Supprimer</button>
</div>
`);

markers.push(marker);

});

}

// GPS
function demarrerGPS(){
navigator.geolocation.getCurrentPosition(pos=>{
tempCoords={lat:pos.coords.latitude,lng:pos.coords.longitude};
map.setView(tempCoords,18);
if(tempMarker) map.removeLayer(tempMarker);
tempMarker=L.marker(tempCoords).addTo(map);
ouvrirModal();
},()=>alert("Activez GPS"));
}

// POST
function envoyerFirebase(){

if(!tempCoords) return alert("Cliquez sur la carte");

const deleteCode=Math.random().toString(36).substring(2,7).toUpperCase();

const data={
type:mType.value,
name:uName.value||"Anonyme",
phone:uPhone.value,
desc:mDesc.value||"",
lat:tempCoords.lat,
lng:tempCoords.lng,
time:Date.now(),
deleteCode:deleteCode
};

if(!data.phone) return alert("Numéro requis");

db.ref('missions').push(data);

fermerModal();

alert("Publié pour 1 mois ✅\nCode suppression: "+deleteCode);
}

// DELETE
function supprimerJob(id, deleteCode){

let code=prompt("Code suppression ou admin");

if(!code) return;

if(code==="237BO" || code.toUpperCase()===deleteCode){
db.ref('missions/'+id).remove();
alert("Supprimé");
}else{
alert("Refusé");
}

}
</script>

</body>
</html>

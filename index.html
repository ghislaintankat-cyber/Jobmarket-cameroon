<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🇨🇲</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
    <style>
        :root { --gold:#f59e0b; --dark:#0f172a; --green:#10b981; --wa:#25D366; }
        body, html { margin:0; height:100%; width:100%; overflow:hidden; font-family:sans-serif; background: #000; }
        
        /* La carte prend tout l'écran sauf le menu bas */
        #map { position:absolute; top:0; bottom:70px; width:100%; z-index: 1; }
        
        /* Boutons Flottants */
        .btn { position:absolute; right:15px; width:50px; height:50px; background:white; border-radius:12px; display:flex; align-items:center; justify-content:center; box-shadow:0 4px 10px rgba(0,0,0,0.3); cursor:pointer; z-index:1000; border:none; font-size: 24px; }
        #gps { top:20px; }
        #add { position:absolute; bottom:90px; right:20px; width:65px; height:65px; border-radius:50%; background:var(--gold); color:white; font-size:35px; border:none; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
        
        /* Panneaux Coulissants */
        .panel { position:fixed; bottom:-100%; left:0; width:100%; background:var(--dark); color:white; padding:20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index:2000; border-radius:25px 25px 0 0; box-sizing: border-box; border-top: 4px solid var(--gold); max-height: 85%; overflow-y: auto; }
        .panel.active { bottom:0; }
        
        /* Formulaires */
        input, textarea { width:100%; padding:14px; margin:8px 0; background:#1e293b; border:1px solid #334155; color:white; border-radius:10px; box-sizing: border-box; font-size: 16px; outline: none; }
        input:focus { border-color: var(--gold); }
        
        /* Zone IA */
        .ai-msg { background:#1e293b; padding:15px; border-radius:12px; margin-top:15px; font-size:14px; line-height:1.6; border-left:5px solid var(--green); color: #e2e8f0; min-height: 50px; }
        
        /* Navigation Basse */
        #bottomNav { position:absolute; bottom:0; width:100%; background:white; display:flex; height: 70px; justify-content:space-around; align-items: center; z-index:1000; border-top: 1px solid #e2e8f0; }
        .nav-btn { text-align:center; font-size:11px; cursor:pointer; color: #64748b; font-weight: bold; flex:1; border:none; background:none; transition: 0.2s; }
        .nav-btn:active { transform: scale(0.9); color: var(--gold); }
    </style>
</head>
<body>

<div id="map"></div>

<button id="gps" class="btn" onclick="centerUser()">🎯</button>
<button id="add" onclick="togglePanel('panel')">+</button>

<div id="panel" class="panel">
    <h3 style="margin:0 0 15px 0; text-align:center; color:var(--gold)">Poster une Mission 🇨🇲</h3>
    <input id="title" placeholder="Quel est le métier ? (ex: Électricien)">
    <input id="phone" type="tel" placeholder="Numéro WhatsApp (ex: 690...)">
    <textarea id="desc" rows="3" placeholder="Description courte (services, tarifs, dispo...)"></textarea>
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; border:none; padding:16px; border-radius:12px; font-weight:bold; font-size:16px; cursor:pointer;">PUBLIER SUR LA CARTE</button>
    <p onclick="togglePanel()" style="text-align:center; color:#94a3b8; margin-top:15px; cursor:pointer;">Fermer</p>
</div>

<div id="businessPanel" class="panel" style="border-top-color: var(--green);">
    <h3 style="margin:0 0 15px 0; text-align:center; color:var(--green)">💰 Coach Business Cameroun</h3>
    <p style="font-size: 12px; color: #94a3b8; text-align: center;">Demandez des idées de business rentables localement.</p>
    <input id="ai-q" placeholder="Ex: Que faire avec 50 000 FCFA ?">
    <button onclick="askAI()" style="width:100%; background:var(--green); color:white; border:none; padding:14px; border-radius:10px; font-weight:bold; cursor:pointer;">DEMANDER AU COACH</button>
    <div id="ai-res" class="ai-msg">Le coach attend votre question...</div>
    <p onclick="togglePanel()" style="text-align:center; color:#94a3b8; margin-top:20px; cursor:pointer;">Fermer</p>
</div>

<div id="bottomNav">
    <button class="nav-btn" onclick="togglePanel('panel')">🧳<br>POSTER</button>
    <button class="nav-btn" onclick="location.reload()">🗺️<br>EXPLORER</button>
    <button class="nav-btn" onclick="togglePanel('businessPanel')">💰<br>BUSINESS</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// --- CONFIGURATION FIREBASE ---
const firebaseConfig = {
    apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
    projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, userMarker, userPos = null;
let savedAIKey = ""; 

// --- INITIALISATION CARTE ---
window.onload = function() {
    // Zoom sur le Cameroun par défaut
    map = L.map('map', { zoomControl: false }).setView([3.86, 11.51], 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '© OpenStreetMap'
    }).addTo(map);

    // Suivre la position GPS de l'utilisateur
    if (navigator.geolocation) {
        navigator.geolocation.watchPosition(pos => {
            userPos = [pos.coords.latitude, pos.coords.longitude];
            if(!userMarker) {
                userMarker = L.circleMarker(userPos, {
                    radius: 10, color: '#3b82f6', fillColor:'#3b82f6', fillOpacity: 0.8
                }).addTo(map).bindPopup("Vous êtes ici");
                map.setView(userPos, 14);
            } else { 
                userMarker.setLatLng(userPos); 
            }
        }, err => console.log("GPS non activé"), { enableHighAccuracy: true });
    }
    loadMarkers();
};

// --- FONCTIONS NAVIGATION ---
function togglePanel(id) {
    document.getElementById('panel').classList.remove("active");
    document.getElementById('businessPanel').classList.remove("active");
    if(id) document.getElementById(id).classList.add("active");
}

function centerUser() {
    if(userPos) map.setView(userPos, 16);
    else alert("Localisation GPS en cours...");
}

// --- LOGIQUE FIREBASE (PUBLIER & CHARGER) ---
function publish() {
    const t = document.getElementById("title").value;
    const p = document.getElementById("phone").value;
    const d = document.getElementById("desc").value;

    if(!t || !p) return alert("Veuillez remplir au moins le métier et le numéro !");
    if(!userPos) return alert("Erreur GPS : Impossible de vous localiser.");

    db.ref("jobs").push({
        title: t,
        phone: p.replace(/\s/g, ''), // Retire les espaces
        desc: d,
        lat: userPos,
        lng: userPos,
        timestamp: Date.now()
    });

    alert("✅ Félicitations ! Votre annonce est en ligne.");
    document.getElementById("title").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("desc").value = "";
    togglePanel();
}

function loadMarkers() {
    db.ref("jobs").on("value", snap => {
        // On nettoie les anciens marqueurs (sauf celui de l'utilisateur)
        map.eachLayer(l => { if(l instanceof L.Marker) map.removeLayer(l); });

        snap.forEach(child => {
            const val = child.val();
            const marker = L.marker([val.lat, val.lng]).addTo(map);
            marker.bindPopup(`
                <div style="font-family:sans-serif; min-width:150px;">
                    <strong style="font-size:16px; color:var(--dark);">${val.title}</strong><br>
                    <p style="margin:5px 0; font-size:13px; color:#475569;">${val.desc}</p>
                    <a href="https://wa.me/${val.phone}" target="_blank" 
                       style="display:block; background:var(--wa); color:white; text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold; margin-top:10px;">
                       CONTACTER WHATSAPP
                    </a>
                </div>
            `);
        });
    });
}

// --- LOGIQUE IA (GEMINI) ---
async function askAI() {
    const q = document.getElementById("ai-q").value;
    const res = document.getElementById("ai-res");
    if(!q) return;

    if (!savedAIKey) {
        savedAIKey = prompt("🔑 Entrez votre clé API Gemini pour activer le coach :\n(Votre clé est protégée et ne sera pas stockée sur GitHub)");
        if (!savedAIKey) return;
    }

    res.innerHTML = "⌛ Analyse du marché camerounais...";
    res.style.color = "#f59e0b";

    try {
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${savedAIKey}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                contents: [{ parts: [{ text: "Tu es un expert en entrepreneuriat au Cameroun. Réponds de manière très courte et pratique. Donne toujours des ordres de prix en FCFA. Question : " + q }] }]
            })
        });

        const data = await response.json();
        if (data.candidates && data.candidates.content) {
            res.innerHTML = "<b>💰 Conseil du Coach :</b><br>" + data.candidates.content.parts.text;
            res.style.color = "white";
        } else {
            res.innerHTML = "⚠️ Erreur de clé ou quota atteint. Réessayez avec une nouvelle clé.";
            savedAIKey = ""; 
        }
    } catch (e) {
        res.innerHTML = "❌ Erreur de connexion au serveur IA.";
    }
}
</script>
</body>
</html>

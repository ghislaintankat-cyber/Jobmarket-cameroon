<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JobMarket Cameroon 🇨🇲</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<style>
:root { --gold:#f59e0b; --dark:#0f172a; --green:#10b981; --wa:#25D366; }
body, html { margin:0; height:100%; width:100%; overflow:hidden; font-family:sans-serif; background:#000; }
#map { position:absolute; top:0; bottom:0; width:100%; z-index: 1; }
.btn { position:absolute; right:15px; width:45px; height:45px; background:white; border-radius:12px; display:flex; align-items:center; justify-content:center; z-index:1000; border:none; font-size:20px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
#gps { top:20px; }
#add { position:absolute; bottom:90px; right:20px; width:65px; height:65px; border-radius:50%; background:var(--gold); color:white; font-size:35px; border:none; z-index:1000; box-shadow: 0 4px 15px rgba(0,0,0,0.4); }
.panel { position:fixed; bottom:-100%; left:0; width:100%; background:var(--dark); color:white; padding:20px; transition:.4s; z-index:2000; border-radius:25px 25px 0 0; box-sizing: border-box; border-top: 4px solid var(--gold); }
.panel.active { bottom:0; }
input, textarea { width:100%; padding:14px; margin:8px 0; background:#1e293b; border:1px solid #334155; color:white; border-radius:10px; box-sizing: border-box; font-size: 16px; }
.ai-msg { background:#1e293b; padding:15px; border-radius:12px; margin-top:15px; border-left:5px solid var(--green); color: #e2e8f0; line-height: 1.5; }
#bottomNav { position:absolute; bottom:0; width:100%; background:white; display:flex; height:70px; justify-content:space-around; align-items:center; z-index:1000; border-top: 1px solid #ddd; }
.nav-btn { text-align:center; font-size:11px; flex:1; border:none; background:none; font-weight: bold; color: #334155; }
</style>
</head>
<body>

<div id="map"></div>
<button id="gps" class="btn" onclick="centerUser()">🎯</button>
<button id="add" onclick="togglePanel('panel')">+</button>

<div id="panel" class="panel">
    <h3 style="text-align:center;color:var(--gold);margin-top:0;">Publier un Job 🇨🇲</h3>
    <input id="title" placeholder="Métier (ex: Plombier)">
    <input id="phone" placeholder="WhatsApp (ex: 6...)">
    <textarea id="desc" placeholder="Décrivez vos services et prix..."></textarea>
    <button onclick="publish()" style="width:100%;background:var(--gold);color:white;padding:15px;border:none;border-radius:10px;font-weight:bold;">PUBLIER SUR LA CARTE</button>
    <p onclick="togglePanel('panel')" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Annuler</p>
</div>

<div id="businessPanel" class="panel" style="border-top-color: var(--green)">
    <h3 style="text-align:center;color:var(--green);margin-top:0;">💰 Coach Business</h3>
    <input id="ai-q" placeholder="Ex: Quel business avec 50.000 FCFA ?">
    <button onclick="askAI()" style="width:100%;background:var(--green);color:white;padding:15px;border:none;border-radius:10px;font-weight:bold;">DEMANDER CONSEIL</button>
    <div id="ai-res" class="ai-msg">Le coach attend votre question...</div>
    <p onclick="togglePanel('businessPanel')" style="text-align:center; color:gray; cursor:pointer; margin-top:15px;">Fermer</p>
</div>

<div id="bottomNav">
    <button class="nav-btn" onclick="togglePanel('panel')">🧳<br>POSTER</button>
    <button class="nav-btn" onclick="location.reload()">🗺️<br>CARTE</button>
    <button class="nav-btn" onclick="togglePanel('businessPanel')">💰<br>COACH IA</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let map, userMarker, userPos=null;

window.onload = function(){
    map = L.map('map', {zoomControl: false}).setView([3.86,11.51],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

    navigator.geolocation.watchPosition(pos=>{
        userPos=[pos.coords.latitude,pos.coords.longitude];
        if(!userMarker){
            userMarker=L.circleMarker(userPos, {radius: 8, color: '#3b82f6', fillColor: '#3b82f6', fillOpacity: 1}).addTo(map);
            map.setView(userPos,14);
        } else userMarker.setLatLng(userPos);
    }, null, {enableHighAccuracy: true});
    loadJobs();
};

function togglePanel(id){ document.getElementById(id).classList.toggle("active"); }

function publish(){
    let t=document.getElementById("title").value, p=document.getElementById("phone").value, d=document.getElementById("desc").value;
    if(!t||!p) return alert("Champs requis !");
    db.ref("jobs").push({title:t,phone:p.replace(/\D/g,''),desc:d,lat:map.getCenter().lat,lng:map.getCenter().lng});
    togglePanel('panel');
    alert("🚀 Job publié avec succès !");
}

function loadJobs(){
    db.ref("jobs").on("value",snap=>{
        map.eachLayer(l=>{ if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
        snap.forEach(c=>{
            let d=c.val();
            L.marker([d.lat,d.lng]).addTo(map)
            .bindPopup(`<b>${d.title}</b><br>${d.desc}<br><br><a href="https://wa.me/${d.phone}" target="_blank" style="background:var(--wa);color:white;padding:8px;border-radius:5px;text-decoration:none;display:block;text-align:center;">WhatsApp</a>`);
        });
    });
}

// ✅ IA FONCTIONNELLE, STABLE ET CORRIGÉE
async function askAI(){
    const q = document.getElementById("ai-q").value;
    const res = document.getElementById("ai-res");
    if(!q) return;

    res.innerHTML = "⌛ Le coach analyse le marché...";
    res.style.color = "#f59e0b";

    // Ta clé AI Studio (Test de piste)
    const apiKey = "AIzaSyCymt0lT75xNKDIiO85nlyL-ULF9DpH7Wg"; 

    try{
        const response = await fetch(`https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${apiKey}`,{
            method:"POST",
            headers:{ "Content-Type":"application/json" },
            body:JSON.stringify({
                contents:[{ parts:[{ text: "Tu es un expert business au Cameroun. Réponds en 2 phrases max avec prix en FCFA. Question : " + q }] }]
            })
        });

        const data = await response.json();

        // ✅ Lecture correcte avec index
        if(data.candidates && data.candidates.length > 0){
            const text = data.candidates.content.parts.text;
            res.innerHTML = "<b>💰 Conseil Expert :</b><br>" + text;
            res.style.color = "white";
        } else {
            res.innerHTML = "⚠️ Pas de réponse du coach.";
            console.log("Erreur API:", data);
        }

    }catch(e){
        res.innerHTML = "❌ Erreur réseau. Vérifie ta connexion.";
        console.error(e);
    }
}

function centerUser(){ if(userPos) map.setView(userPos,16); }
</script>
</body>
  </html>

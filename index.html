<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>JobMarket Pro 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; --slate:#1e293b; }

body,html{margin:0;height:100%;overflow:hidden;font-family: 'Segoe UI', sans-serif; background:var(--dark);}
#map{position:absolute;width:100%;height:100%; z-index: 1;}

/* BOUTONS FLOTTANTS */
.btn{
position:absolute;right:15px;width:45px;height:45px;
background:white;border-radius:12px;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;z-index:1000; font-size: 20px;
overflow: hidden;
}
#gps{top:20px;}
#mapType{top:75px;}
#clear{top:130px;background:#ef4444;color:white;display:none;}
#authBtn{top:185px; border: 2px solid var(--gold);}

#add{
position:absolute;bottom:25px;right:20px;
width:65px;height:65px;border-radius:50%;
background:var(--gold);color:white;
font-size:35px;border:none;z-index:1000;
box-shadow: 0 4px 15px rgba(245, 158, 11, 0.4);
cursor: pointer;
}

/* PANEL NOIR DE PUBLICATION */
.panel{
position:fixed;bottom:-100%;left:0;width:100%;
background:var(--dark);color:white;padding:25px;
transition:.4s cubic-bezier(0.4, 0, 0.2, 1);
border-radius:25px 25px 0 0;
z-index:2000; box-sizing: border-box;
border-top: 4px solid var(--gold);
}
.panel.active{bottom:0;}

input,textarea{
width:100%;padding:14px;margin:8px 0;
background:var(--slate);border:1px solid #334155;
color:white;border-radius:10px; box-sizing: border-box;
outline: none; font-size: 16px;
}

.btn-publier {
    width: 100%; background: var(--gold); color: white; border: none;
    padding: 15px; border-radius: 10px; font-weight: bold; font-size: 16px;
    margin-top: 10px; cursor: pointer;
}

/* ROUTE INFO BOX */
#routeBox{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:rgba(15, 23, 42, 0.9);color:white;
padding:10px 20px;border-radius:30px;
border:2px solid var(--gold);
z-index:1000;display:none; font-weight: bold;
box-shadow: 0 4px 15px rgba(0,0,0,0.5);
white-space: nowrap;
}

/* DESIGN POPUP */
.job-card { min-width: 190px; }
.job-title { font-weight: bold; font-size: 18px; color: var(--gold); margin-bottom: 5px; }
.job-desc { font-size: 14px; color: #444; margin-bottom: 10px; }
.btn-action {
    background: var(--gold); color: white; padding: 10px; border-radius: 8px;
    text-align: center; margin-top: 8px; cursor: pointer; font-weight: bold;
    text-decoration: none; display: block;
}
</style>
</head>

<body>

<div id="routeBox">Calcul...</div>
<div id="map"></div>

<div id="gps" class="btn" onclick="centerUser()">🎯</div>
<div id="mapType" class="btn" onclick="toggleMap()">🛰️</div>
<div id="clear" class="btn" onclick="clearRoute()">❌</div>
<div id="authBtn" class="btn" onclick="handleAuth()">👤</div>

<button id="add" onclick="togglePanel()">+</button>

<div id="panel" class="panel">
    <h3 style="text-align:center;color:var(--gold);">Nouvelle Annonce 📍</h3>
    <input id="titleInput" placeholder="Métier (ex: Électricien)">
    <input id="phoneInput" type="tel" placeholder="WhatsApp (ex: 6...)">
    <textarea id="descInput" rows="3" placeholder="Détails du service..."></textarea>
    <button class="btn-publier" onclick="publish()">Publier maintenant</button>
    <div style="text-align:center;margin-top:10px;color:#94a3b8;cursor:pointer;" onclick="togglePanel()">Annuler</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script>
// CONFIG FIREBASE
const firebaseConfig = {
    apiKey: "AIzaSy...", // TA CLÉ API FIREBASE ICI
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();
const provider = new firebase.auth.GoogleAuthProvider();

const ADMIN_CODE = "237BO";
let currentUser = null;

// AUTHENTIFICATION
auth.onAuthStateChanged(user => {
    currentUser = user;
    const btn = document.getElementById("authBtn");
    if (user) {
        btn.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;">`;
    } else {
        btn.innerHTML = "👤";
    }
});

function handleAuth() {
    if (currentUser) {
        if(confirm("Se déconnecter ?")) auth.signOut();
    } else {
        auth.signInWithPopup(provider).catch(e => alert(e.message));
    }
}

// CARTE HD
let map = L.map('map',{zoomControl:false, maxZoom:22}).setView([3.86, 11.51], 7);
const normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
const sat = L.layerGroup([
    L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
    L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')
]);

let mode = "normal";
function toggleMap() {
    if(mode === "normal") { map.removeLayer(normal); sat.addTo(map); mode = "sat"; }
    else { map.removeLayer(sat); normal.addTo(map); mode = "normal"; }
}

// GPS
let userPos = null;
let userMarker = null;
navigator.geolocation.watchPosition(pos => {
    userPos = [pos.coords.latitude, pos.coords.longitude];
    if(userMarker) map.removeLayer(userMarker);
    userMarker = L.circleMarker(userPos, {radius:8, color:'#3b82f6', fillOpacity:1}).addTo(map);
}, ()=>{}, {enableHighAccuracy:true});

function centerUser() { if(userPos) map.setView(userPos, 16); }

// ROUTING
let routingControl = null;
function createRoute(lat, lng) {
    if(!userPos) return alert("Active ton GPS");
    if(routingControl) map.removeControl(routingControl);
    
    routingControl = L.Routing.control({
        waypoints: [ L.latLng(userPos), L.latLng(lat, lng) ],
        createMarker: () => null,
        addWaypoints: false,
        show: false,
        lineOptions: { styles: [{color: '#f59e0b', weight: 6, opacity: 0.9}] }
    }).on('routesfound', e => {
        let r = e.routes.summary;
        document.getElementById("routeBox").innerHTML = `🚗 ${(r.totalDistance/1000).toFixed(1)} km | ⏱️ ${Math.round(r.totalTime/60)} min`;
        document.getElementById("routeBox").style.display = "block";
        document.getElementById("clear").style.display = "flex";
    }).addTo(map);
    map.closePopup();
}

function clearRoute() {
    if(routingControl) { map.removeControl(routingControl); routingControl = null; }
    document.getElementById("routeBox").style.display = "none";
    document.getElementById("clear").style.display = "none";
}

// PANEL
function togglePanel() { 
    if(!currentUser) return alert("Connectez-vous d'abord (icône 👤)");
    document.getElementById("panel").classList.toggle("active"); 
}

// PUBLIER
function publish() {
    let t = document.getElementById("titleInput").value;
    let p = document.getElementById("phoneInput").value;
    let d = document.getElementById("descInput").value;
    
    if(!t || !p) return alert("Remplis les champs !");
    
    db.ref("jobs").push({
        title: t, phone: p.replace(/\D/g,''), desc: d,
        lat: map.getCenter().lat, lng: map.getCenter().lng,
        time: Date.now(),
        userId: currentUser.uid,
        userName: currentUser.displayName
    });

    togglePanel();
    document.getElementById("titleInput").value=""; document.getElementById("phoneInput").value=""; document.getElementById("descInput").value="";
}

// SUPPRIMER
function deleteJob(id, ownerId) {
    let code = "";
    // Si c'est l'auteur connecté, il peut supprimer direct
    if(currentUser && currentUser.uid === ownerId) {
        if(confirm("Voulez-vous supprimer votre annonce ?")) db.ref("jobs/"+id).remove();
    } else {
        code = prompt("Code secret Admin requis :");
        if(code === ADMIN_CODE) {
            db.ref("jobs/"+id).remove();
            alert("Supprimé par l'admin.");
        } else { alert("Code incorrect."); }
    }
}

// CHARGEMENT
db.ref("jobs").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });
    snap.forEach(j => {
        let d = j.val();
        if(Date.now() - d.time > 2592000000) { db.ref("jobs/"+j.key).remove(); return; }

        let m = L.marker([d.lat, d.lng]).addTo(map);
        let distStr = userPos ? `📍 ${(map.distance(userPos, [d.lat, d.lng])/1000).toFixed(1)} km` : "";

        m.bindPopup(`
            <div class="job-card">
                <div class="job-title">${d.title}</div>
                <div class="job-desc">${d.desc || ""}</div>
                <div style="font-weight:bold;color:gray;font-size:12px;">${distStr}</div>
                <div class="btn-action" onclick="createRoute(${d.lat},${d.lng})">🧭 Itinéraire</div>
                <a href="https://wa.me/${d.phone}" target="_blank" class="btn-action" style="background:#25D366">WhatsApp</a>
                <div style="text-align:center;margin-top:12px;border-top:1px solid #eee;padding-top:8px;">
                    <span onclick="deleteJob('${j.key}', '${d.userId}')" style="color:red;font-size:11px;cursor:pointer;font-weight:bold;">🗑️ SUPPRIMER</span><br>
                    <small style="color:gray;font-size:9px;">Par ${d.userName || 'Anonyme'}</small>
                </div>
            </div>
        `);
    });
});
</script>
</body>
</html>

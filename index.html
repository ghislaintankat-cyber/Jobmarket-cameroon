<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>JobMarket Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<div id="map"></div>

<div id="jobsList" class="hidden"></div>

<div id="accountBox" class="hidden">
  <h2>Compte</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="register()">Créer</button>
  <button onclick="login()">Connexion</button>
</div>

<div id="chatBox" class="hidden">
  <h2>Chat</h2>
  <div id="messages"></div>
  <input id="msgInput">
  <button onclick="sendMessage()">Envoyer</button>
</div>

<div id="formBox" class="form hidden">
  <input id="title" placeholder="Titre">
  <textarea id="desc" placeholder="Description"></textarea>
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="Téléphone">
  <button onclick="addJob()">Publier</button>
</div>

<button class="fab" onclick="openForm()">+</button>

<div class="bottom-nav">
  <button onclick="showMap()">📍Carte</button>
  <button onclick="showList()">📄Jobs</button>
  <button onclick="showChat()">💬Chat</button>
  <button onclick="showAccount()">👤Compte</button>
</div>

<script src="app.js"></script>

</body>
                </html>

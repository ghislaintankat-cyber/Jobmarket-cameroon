<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Pro 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; }

body, html {
margin:0; padding:0; height:100%;
font-family:Segoe UI, sans-serif;
overflow:hidden;
}

#map {
position:absolute;
top:0; bottom:0;
width:100%;
}

.btn {
position:absolute;
right:20px;
background:white;
z-index:1000;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
font-weight: bold;
}

#user { top:20px; width:50px;height:50px;border-radius:50%; overflow: hidden; border: 2px solid var(--gold); }
#gps { top:80px;width:45px;height:45px;border-radius:10px; font-size: 20px; }
#switch { top:140px;width:45px;height:45px;border-radius:10px; font-size: 20px; }

#add {
position:absolute;
bottom:30px;
right:20px;
width:65px;height:65px;
border-radius:50%;
background:var(--gold);
font-size:30px;
border:none;
z-index:1000;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
}

.modal {
position:fixed;
bottom:-100%;
width:100%;
background:#0f172a;
color:white;
padding:20px;
transition:0.4s;
z-index:2000;
box-sizing: border-box;
border-top: 3px solid var(--gold);
border-radius: 20px 20px 0 0;
}

.modal.active { bottom:0; }

input, textarea {
width:100%;
padding:12px;
margin:6px 0;
border-radius: 8px;
border: none;
box-sizing: border-box;
}

.btn-action { width: 100%; padding: 12px; margin-top: 10px; font-weight: bold; background: var(--gold); border: none; border-radius: 8px; cursor: pointer; }
.btn-close { width: 100%; padding: 12px; margin-top: 10px; background: #334155; color: white; border: none; border-radius: 8px; cursor: pointer; }
</style>
</head>

<body>

<div id="map"></div>

<div id="user" class="btn" onclick="openModal('profile')">?</div>
<div id="gps" class="btn" onclick="centerUser()">🎯</div>
<div id="switch" class="btn" onclick="toggleMap()">🛰️</div>
<button id="add" onclick="openModal('publish')">+</button>

<div id="profile" class="modal">
    <button class="btn-action" onclick="loginGoogle()">Connexion Google</button>
    <button class="btn-action" style="background:#ef4444; color:white;" onclick="logout()">Déconnexion</button>
    <button class="btn-close" onclick="closeModal()">Fermer</button>
</div>

<div id="publish" class="modal">
    <input id="title" placeholder="Métier">
    <textarea id="desc" placeholder="Détails"></textarea>
    <input id="phone" placeholder="WhatsApp">
    <button class="btn-action" onclick="publish()">Publier</button>
    <button class="btn-close" onclick="closeModal()">Annuler</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>

// FIREBASE
const firebaseConfig = {
apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
authDomain: "jobmarketfuture.firebaseapp.com",
databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// MAP
let map = L.map('map',{maxZoom:22, zoomControl:false}).setView([3.86,11.51],7);

// CARTES
const normalMap = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

const satelliteMap = L.layerGroup([
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
L.tileLayer('https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}')
]);

let current="normal";

function toggleMap(){
if(current==="normal"){
map.removeLayer(normalMap);
satelliteMap.addTo(map);
current="satellite";
}else{
map.removeLayer(satelliteMap);
normalMap.addTo(map);
current="normal";
}
}

// GPS
let userPos=null;
let userMarker=null;

navigator.geolocation.watchPosition(pos=>{
userPos=[pos.coords.latitude,pos.coords.longitude];

if(userMarker) map.removeLayer(userMarker);

userMarker=L.circleMarker(userPos,{color:'#3b82f6', radius:8, fillOpacity:0.8}).addTo(map);
}, ()=>{}, {enableHighAccuracy: true});

// CENTER
function centerUser(){
if(userPos) map.setView(userPos,16);
else alert("Active ton GPS");
}

// CLICK POSITION
let selected=null;
map.on('click',e=>{
selected=e.latlng;
alert("Position choisie 📍 ! Tu peux maintenant cliquer sur + pour publier ici.");
});

// MODAL
function openModal(id){
document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
document.getElementById(id).classList.add('active');
}
function closeModal(){
document.querySelectorAll('.modal').forEach(m=>m.classList.remove('active'));
}

// AUTH
function loginGoogle(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).then(()=>closeModal());
}

function logout(){ auth.signOut(); closeModal(); }

auth.onAuthStateChanged(user => {
    const btn = document.getElementById('user');
    if(user) {
        btn.innerHTML = `<img src="${user.photoURL}" style="width:100%;height:100%;object-fit:cover;">`;
    } else {
        btn.innerHTML = "?";
    }
});

// PUBLISH
function publish(){

const user=auth.currentUser;
if(!user) {
    alert("Connecte-toi d'abord !");
    return openModal('profile');
}

if(!title.value || !phone.value) return alert("Champs requis");

const data={
title:title.value,
desc:desc.value,
phone:phone.value.replace(/\D/g,''),
lat:selected ? selected.lat : map.getCenter().lat,
lng:selected ? selected.lng : map.getCenter().lng,
time:Date.now(),
owner:user.email
};

db.ref("jobs").push(data).then(() => {
    alert("Publié avec succès ! 🚀");
    closeModal();
    title.value = ""; desc.value = ""; phone.value = "";
    selected = null; // Réinitialise la position
});

fetch("https://jobmarket-cameroon.onrender.com/job-created",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(data)
}).catch(()=>console.log("Render offline"));

}

// DISPLAY
db.ref("jobs").on("value",snap=>{

map.eachLayer(l=>{
if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l);
});

snap.forEach(j=>{

let d=j.val();

// AUTO DELETE 30J
if(Date.now()-d.time > 30*24*60*60*1000){
db.ref("jobs/"+j.key).remove();
return;
}

let marker=L.marker([d.lat,d.lng]).addTo(map);

let info="";

if(userPos){
const dist=map.distance(userPos,[d.lat,d.lng])/1000;
// LIEN OFFICIEL GOOGLE MAPS CORRIGÉ
const url=`https://www.google.com/maps/dir/?api=1&destination=${d.lat},${d.lng}`;

info=`
<br><span style="color:gray; font-size:12px;">📍 À ${dist.toFixed(2)} km</span>
<br><a href="${url}" target="_blank" style="color:var(--gold); font-weight:bold; text-decoration:none;">🧭 Itinéraire GPS</a>
`;
}

marker.bindPopup(`
<div style="font-family:sans-serif;">
<b style="font-size:16px;">${d.title}</b><br>
${d.desc}
${info}<br><br>
<a href="https://wa.me/${d.phone}" target="_blank" style="background:#25D366; color:white; padding:8px 12px; border-radius:8px; text-decoration:none; font-weight:bold; display:block; text-align:center;">WhatsApp</a>
</div>
`);

});

});

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.css"/>

<style>
body{margin:0;font-family:sans-serif;}
#map{height:70vh;}
input,button{width:90%;margin:5px;padding:10px;}
</style>

</head>
<body>

<h3>JobMarket</h3>

<div id="auth">
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">
<button onclick="login()">Connexion</button>
<button onclick="register()">Inscription</button>
</div>

<div id="app" style="display:none;">
<input id="title" placeholder="Titre du job">
<input id="desc" placeholder="Description">
<button onclick="publish()">Publier</button>
</div>

<div id="map"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.7.1/leaflet.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
apiKey: "TA_CLE_ICI",
authDomain: "jobmarketfuture.firebaseapp.com",
databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

let map = L.map('map').setView([3.8,11.5],10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function login(){
auth.signInWithEmailAndPassword(email.value,password.value);
}

function register(){
auth.createUserWithEmailAndPassword(email.value,password.value);
}

function publish(){
let user = auth.currentUser;

db.ref("jobs").push({
title:title.value,
desc:desc.value,
uid:user.uid
});

}

auth.onAuthStateChanged(user=>{
if(user){
document.getElementById("auth").style.display="none";
document.getElementById("app").style.display="block";
}else{
document.getElementById("auth").style.display="block";
document.getElementById("app").style.display="none";
}
});

</script>

</body>
</html>

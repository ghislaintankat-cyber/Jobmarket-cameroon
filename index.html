<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobMarket Cameroon</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<div class="header">JobMarket Pro</div>

<div id="map"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-item active" onclick="showScreen('map')">Carte</div>
  <div class="nav-item" onclick="showScreen('jobs')">Jobs</div>
  <div class="nav-item" onclick="showScreen('account')">Compte</div>
</div>

<!-- JOBS -->
<div id="jobs" class="jobs">
  <h3>Jobs disponibles</h3>
  <div id="jobsList"></div>
</div>

<!-- COMPTE -->
<div id="account" class="account">
  <h3>Mon compte</h3>

  <input placeholder="Email">
  <input placeholder="Mot de passe" type="password">

  <button>Connexion</button>
  <button>Créer compte</button>

  <input placeholder="Code admin">
  <button>Admin</button>
</div>

<!-- FLOAT BUTTON -->
<div class="fab" onclick="centerMap()">📍</div>

<script src="app.js"></script>

</body>
  </html>

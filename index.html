<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Ultra 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; }
body,html{margin:0;height:100%;overflow:hidden;font-family:sans-serif; background: var(--dark);}
#map{position:absolute;width:100%;height:100%; z-index: 1;}

.btn{
position:absolute;right:15px;width:45px;height:45px;
background:white;border-radius:12px;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;z-index:1000;
}
#gps{top:20px;}
#mapType{top:75px;}
#clear{top:130px;background:red;color:white;display:none;}

#add{
position:absolute;bottom:90px;right:20px;
width:65px;height:65px;border-radius:50%;
background:var(--gold);color:white;font-size:30px;border:none;
z-index:1000; cursor: pointer;
}

.panel{
position:fixed;bottom:-100%;left:0;width:100%;
background:#0f172a;color:white;padding:20px;
transition:.4s;z-index:2000;border-radius:20px 20px 0 0;
box-sizing: border-box;
}
.panel.active{bottom:0;}

input,textarea{
width:100%;padding:12px;margin:8px 0;
background:#1e293b;border:none;color:white;border-radius:8px;
box-sizing: border-box;
}

#routeBox{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:#000a;color:white;padding:10px 20px;
border-radius:20px;border:2px solid var(--gold);
z-index:1000;display:none;
}

#bottomNav{
position:absolute;bottom:0;width:100%;
background:white;display:flex;
justify-content:space-around;padding:10px 0;
z-index:1000;
}

.nav-btn{ text-align:center;font-size:12px;cursor:pointer; }
</style>
</head>

<body>

<div id="routeBox"></div>
<div id="map"></div>

<div id="gps" class="btn" onclick="centerUser()">🎯</div>
<div id="mapType" class="btn" onclick="toggleMap()">🛰️</div>
<div id="clear" class="btn" onclick="clearRoute()">❌</div>
<button id="add" onclick="togglePanel()">+</button>

<div id="panel" class="panel">
    <input id="title" placeholder="Métier">
    <input id="phone" placeholder="WhatsApp">
    <textarea id="desc" placeholder="Description"></textarea>
    <button onclick="publish()" style="width:100%; background:var(--gold); color:white; border:none; padding:12px; border-radius:8px;">Publier</button>
</div>

<div id="bottomNav">
    <div class="nav-btn">🧳 Jobs</div>
    <div class="nav-btn">🗺️ Carte</div>
    <div class="nav-btn">💰 Business</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>
// Firebase Initialisation avec TES CLÉS
const firebaseConfig = {
  apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ADMIN
let clickCount=0;
let admin=false;
document.body.addEventListener("click",()=>{
    clickCount++;
    if(clickCount===5){
        let code=prompt("Code admin");
        if(code==="237BO"){admin=true;alert("ADMIN ACTIVÉ");}
        clickCount=0;
    }
});

// INITIALISER LA CARTE
let map = L.map('map',{zoomControl:false}).setView([3.86, 11.51], 13);
let normal = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let sat = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');

let mode="normal";
function toggleMap(){
    if(mode==="normal"){ map.removeLayer(normal); sat.addTo(map); mode="sat"; }
    else { map.removeLayer(sat); normal.addTo(map); mode="normal"; }
}

// GPS & POINT BLEU
let userPos = null;
let userMarker = null;

navigator.geolocation.watchPosition(pos => {
    userPos = [pos.coords.latitude, pos.coords.longitude];
    if(!userMarker) {
        userMarker = L.circleMarker(userPos, {radius: 8, color: '#3b82f6', fillOpacity: 1}).addTo(map);
    } else {
        userMarker.setLatLng(userPos);
    }
}, err => { console.log("GPS Error ou refusé"); }, {enableHighAccuracy: true});

function centerUser(){
    if(userPos) map.setView(userPos, 16);
    else alert("Position GPS non détectée. Vérifie tes réglages.");
}

// ROUTE
let routeControl = null;
function createRoute(lat, lng){
    if(!userPos) return alert("Position GPS requise pour l'itinéraire");
    if(routeControl) map.removeControl(routeControl);

    routeControl = L.Routing.control({
        waypoints: [ L.latLng(userPos), L.latLng(lat, lng) ],
        createMarker: () => null,
        addWaypoints: false,
        lineOptions: { styles: [{color: '#f59e0b', weight: 6}] }
    }).on('routesfound', e => {
        let r = e.routes.summary;
        let box = document.getElementById("routeBox");
        box.innerHTML = `${(r.totalDistance/1000).toFixed(1)} km | ${Math.round(r.totalTime/60)} min`;
        box.style.display = "block";
        document.getElementById("clear").style.display = "flex";
    }).addTo(map);
}

function clearRoute(){
    if(routeControl) map.removeControl(routeControl);
    document.getElementById("routeBox").style.display = "none";
    document.getElementById("clear").style.display = "none";
}

// PANEL ACTIONS
function togglePanel(){ 
    document.getElementById("panel").classList.toggle("active"); 
}

function publish(){
    let t = document.getElementById("title").value;
    let p = document.getElementById("phone").value;
    let d = document.getElementById("desc").value;

    if(!t || !p) return alert("Remplis au moins le métier et le WhatsApp !");

    db.ref("jobs").push({
        title: t,
        phone: p.replace(/\D/g,''),
        desc: d,
        lat: map.getCenter().lat,
        lng: map.getCenter().lng,
        time: Date.now()
    });

    document.getElementById("title").value = "";
    document.getElementById("phone").value = "";
    document.getElementById("desc").value = "";
    togglePanel();
}

function deleteJob(id){
    if(admin) db.ref("jobs/"+id).remove();
}

// CHARGEMENT TEMPS RÉEL
db.ref("jobs").on("value", snap => {
    map.eachLayer(l => { if(l instanceof L.Marker && l !== userMarker) map.removeLayer(l); });

    snap.forEach(j => {
        let data = j.val();
        let key = j.key;

        // Auto-suppression après 30 jours
        if(Date.now() - data.time > 2592000000) { db.ref("jobs/"+key).remove(); return; }

        let marker = L.marker([data.lat, data.lng]).addTo(map);
        marker.bindPopup(`
            <div style="font-family: sans-serif;">
                <b style="font-size:16px; color:#f59e0b;">${data.title}</b><br>
                <p style="margin:5px 0;">${data.desc || ""}</p>
                <button onclick="createRoute(${data.lat},${data.lng})" style="background:#f59e0b; color:white; border:none; padding:8px; border-radius:5px; width:100%; cursor:pointer;">🧭 Itinéraire</button><br>
                <a href="https://wa.me/${data.phone}" target="_blank" style="display:block; text-align:center; background:#25D366; color:white; padding:8px; border-radius:5px; margin-top:5px; text-decoration:none;">WhatsApp</a><br>
                ${admin ? `<button onclick="deleteJob('${key}')" style="color:red; background:none; border:none; width:100%; cursor:pointer;">Supprimer</button>` : ""}
            </div>
        `);
    });
});

</script>
</body>
</html>

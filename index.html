<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🛰️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    
    <style>
        :root { --gold: #f59e0b; --dark: #0f172a; }
        body { margin: 0; padding: 0; background: #000; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); font-weight: bold; z-index: 10; }

        /* Correction de la hauteur pour mobile */
        #map { flex-grow: 1; width: 100%; background: #222; }

        .btn-float { 
            position: fixed; bottom: 25px; right: 20px; left: 20px; 
            background: var(--gold); color: black; border: none; 
            height: 55px; border-radius: 30px; font-weight: bold; 
            z-index: 1000; font-size: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* Modal de publication */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: #1e293b; padding: 20px; border-radius: 15px; width: 85%; max-width: 350px; border: 1px solid var(--gold); }
        input, select, textarea { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        .btn-send { background: var(--gold); color: black; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <header>JOBMARKET CAMEROON 🛰️</header>
    
    <div id="map"></div>
    
    <button class="btn-float" onclick="demarrerGPS()">📍 PUBLIER À MA POSITION</button>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3 style="color:var(--gold); margin-top:0;">Nouveau Job ✨</h3>
            <select id="mType">
                <option value="🏊 Nageur">Maître-Nageur</option>
                <option value="🛠️ Dépannage">Dépannage</option>
                <option value="📦 Livraison">Livraison</option>
                <option value="🧹 Ménage">Ménage</option>
            </select>
            <input type="text" id="uName" placeholder="Ton nom">
            <input type="number" id="uPhone" placeholder="WhatsApp (695...)">
            <textarea id="mDesc" rows="3" placeholder="Description..."></textarea>
            <button class="btn-send" onclick="envoyerFirebase()">VALIDER ✅</button>
            <button onclick="document.getElementById('pubModal').style.display='none'" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map, tempCoords;

        window.onload = function() {
            // Initialisation de la carte
            map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);

            // Vue Satellite ArcGIS
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);

            // Rafraîchir l'affichage
            setTimeout(() => { map.invalidateSize(); }, 800);

            // Clic sur la carte pour publier
            map.on('click', function(e) {
                tempCoords = e.latlng;
                document.getElementById('pubModal').style.display = 'flex';
            });

            // Charger les marqueurs existants
            db.ref('missions').on('child_added', (snap) => {
                const m = snap.val();
                L.marker([m.lat, m.lng]).addTo(map)
                .bindPopup(`<b>${m.type}</b><br>${m.name}<br><a href="https://wa.me/237${m.phone}" target="_blank" style="color:#25D366; font-weight:bold; text-decoration:none;">WhatsApp</a>`);
            });
        };

        function demarrerGPS() {
            navigator.geolocation.getCurrentPosition((pos) => {
                tempCoords = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                map.flyTo([tempCoords.lat, tempCoords.lng], 17);
                setTimeout(() => { document.getElementById('pubModal').style.display = 'flex'; }, 1000);
            }, () => { alert("Activez votre GPS !"); });
        }

        function envoyerFirebase() {
            const data = {
                type: document.getElementById('mType').value,
                name: document.getElementById('uName').value || "Anonyme",
                phone: document.getElementById('uPhone').value,
                desc: document.getElementById('mDesc').value,
                lat: tempCoords.lat, lng: tempCoords.lng
            };
            if(!data.phone || !tempCoords) return alert("Remplissez tout !");
            
            db.ref('missions').push(data).then(() => {
                alert("Annonce publiée ! ✅");
                document.getElementById('pubModal').style.display = 'none';
            });
        }
    </script>
</body>
</html>

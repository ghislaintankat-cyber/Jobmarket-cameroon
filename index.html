<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>JobMarket Pro</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js"></script>

</head>

<body>

<h2>JobMarket Pro 🌍</h2>

<!-- JOBS -->
<div id="jobsScreen"></div>

<!-- MAP -->
<div id="mapScreen" class="hidden">
  <div id="map"></div>

  <div class="distance-box">
    Distance: <span id="distance">0</span> km
  </div>

  <!-- + BUTTON -->
  <div class="fab" onclick="toggleForm()">+</div>

  <!-- FORM -->
  <div id="jobForm" class="form-popup hidden">
    <input id="title" placeholder="Travail">
    <textarea id="desc" placeholder="Description"></textarea>
    <input id="price" placeholder="Prix">
    <input id="phone" placeholder="Téléphone">
    <button onclick="addJob()">Publier</button>
  </div>
</div>

<!-- ACCOUNT -->
<div id="accountScreen" class="hidden">

<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Mot de passe">

<button onclick="login()">Connexion</button>
<button onclick="register()">Créer</button>
<button onclick="googleLogin()">Google</button>

<br><br>

<select id="mode">
<option value="worker">Rechercher travail</option>
<option value="client">Poster travail</option>
</select>

<input id="pseudo" placeholder="Pseudo ou nom">
<textarea id="cv" placeholder="Ton CV"></textarea>

<button onclick="saveProfile()">Sauvegarder</button>

</div>

<!-- BUSINESS -->
<div id="businessScreen" class="hidden">
<h3>Business</h3>
<button onclick="boostJob()">Booster un job</button>
</div>

<!-- NAV -->
<div class="nav">
<button onclick="showScreen('jobs')">Poster</button>
<button onclick="showScreen('map')">Carte</button>
<button onclick="showScreen('account')">Compte</button>
<button onclick="showScreen('business')">Business</button>
</div>

<script src="app.js"></script>

</body>
  </html>

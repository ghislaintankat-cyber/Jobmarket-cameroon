<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Navigation Pro 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
body { margin:0; font-family:sans-serif; background:#0f172a; color:white; }

#map { height: 100vh; }

.top-bar {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  color:black;
  padding:10px;
  border-radius:15px;
  z-index:1000;
}

.map-switch {
  position:absolute;
  top:70px;
  left:10px;
  z-index:1000;
  background:white;
  padding:5px;
  border-radius:10px;
}

.map-switch button {
  display:block;
  margin:5px 0;
  padding:6px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.fab {
  position:absolute;
  bottom:20px;
  right:20px;
  background:#f59e0b;
  width:60px;
  height:60px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:30px;
  color:white;
  z-index:1000;
  cursor:pointer;
}

#navInfo {
  position:absolute;
  bottom:90px;
  left:10px;
  background:white;
  color:black;
  padding:10px;
  border-radius:10px;
  z-index:1000;
}
</style>
</head>

<body>

<div class="top-bar">📍 JobMarket Pro</div>

<div class="map-switch">
  <button onclick="setMap('standard')">🗺️ Standard</button>
  <button onclick="setMap('satellite')">🛰️ Satellite</button>
</div>

<div id="map"></div>

<div id="navInfo">Navigation: inactive</div>

<div class="fab" onclick="addJob()">+</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIza...",
  authDomain: "jobmarketfuture.firebaseapp.com",
  databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
  projectId: "jobmarketfuture"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// MAP
const map = L.map('map').setView([3.848, 11.502], 6);

const standard = L.tileLayer(
  'https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'
);

const satellite = L.tileLayer(
  'https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'
);

standard.addTo(map);

let currentLayer = standard;

window.setMap = (type) => {
  map.removeLayer(currentLayer);

  if (type === 'standard') currentLayer = standard;
  else currentLayer = satellite;

  currentLayer.addTo(map);
};

// ROUTING
let routeControl = null;
let watchId = null;

function speak(text) {
  const msg = new SpeechSynthesisUtterance(text);
  msg.lang = "fr-FR";
  msg.rate = 1.05;
  window.speechSynthesis.cancel();
  window.speechSynthesis.speak(msg);
}

window.goToJob = (lat, lng) => {

  if (watchId) navigator.geolocation.clearWatch(watchId);

  watchId = navigator.geolocation.watchPosition(pos => {

    const userLat = pos.coords.latitude;
    const userLng = pos.coords.longitude;

    if (routeControl) map.removeControl(routeControl);

    routeControl = L.Routing.control({
      waypoints: [
        L.latLng(userLat, userLng),
        L.latLng(lat, lng)
      ],
      addWaypoints: false
    }).addTo(map);

    routeControl.on('routesfound', function(e) {
      const route = e.routes[0];

      const distance = (route.summary.totalDistance / 1000).toFixed(2);
      const time = Math.round(route.summary.totalTime / 60);

      document.getElementById("navInfo").innerHTML =
        `📍 ${distance} km<br>⏱ ${time} min`;

      route.instructions.forEach(step => {
        speak(step.text);
      });
    });

  });
};

// LOAD JOBS
onValue(ref(db, 'jobs'), snapshot => {
  map.eachLayer(layer => {
    if (layer instanceof L.Marker) map.removeLayer(layer);
  });

  const data = snapshot.val();
  if (!data) return;

  Object.keys(data).forEach(id => {
    const job = data[id];

    const marker = L.marker([job.lat, job.lng]).addTo(map);

    marker.bindPopup(`
      <b>${job.title}</b><br>
      ${job.description}<br><br>
      <button onclick="goToJob(${job.lat}, ${job.lng})">
        📍 Y aller
      </button>
    `);
  });
});

// ADD JOB
window.addJob = () => {
  const title = prompt("Titre ?");
  const desc = prompt("Description ?");

  if (!title || !desc) return;

  navigator.geolocation.getCurrentPosition(pos => {
    push(ref(db, 'jobs'), {
      title,
      description: desc,
      lat: pos.coords.latitude,
      lng: pos.coords.longitude
    });
  });
};

</script>

</body>
    </html>

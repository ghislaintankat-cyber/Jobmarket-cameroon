<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<link rel="stylesheet" href="style.css">

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
</head>

<body>

<div id="map"></div>

<div id="list" class="screen hidden"></div>

<div id="account" class="screen hidden">
  <h2>Compte</h2>
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Mot de passe">
  <button onclick="login()">Connexion</button>
  <button onclick="register()">Créer compte</button>
  <button onclick="googleLogin()">Google</button>
</div>

<div id="formBox" class="form hidden">
  <input id="title" placeholder="Titre">
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="Téléphone">
  <button onclick="addJob()">Publier</button>
</div>

<button id="fab" onclick="toggleForm()">+</button>

<nav>
  <button onclick="showMap()">📍 Carte</button>
  <button onclick="showList()">📄 Publier</button>
  <button onclick="showAccount()">👤 Compte</button>
</nav>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="app.js"></script>

</body>
  </html>

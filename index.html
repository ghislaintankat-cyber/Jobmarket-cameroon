<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>JobMarket Cameroon</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <link rel="stylesheet" href="style.css"/>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
</head>
<body>

<div id="map"></div>

<header class="topbar">
  <div class="logo">JobMarket Cameroon</div>
  <div class="filters">
    <button onclick="filterJobs('all')">Tous</button>
    <button onclick="filterJobs('plombier')">Plombier</button>
    <button onclick="filterJobs('macon')">Maçon</button>
    <button onclick="filterJobs('electricien')">Électricien</button>
  </div>
</header>

<div id="itineraryPanel" class="itinerary-panel hidden">
  <h3 id="routeTitle">Distance</h3>
  <p id="itineraryDistance">0 km</p>
  <p id="itineraryDirection">Direction</p>
</div>

<div id="publishDrawer" class="drawer hidden">
  <input id="title" placeholder="Titre du job">
  <input id="price" placeholder="Prix">
  <input id="phone" placeholder="Téléphone">
  <textarea id="desc" placeholder="Description"></textarea>
  <button onclick="addJob()">Publier</button>
</div>

<div id="accountDrawer" class="drawer hidden">
  <div class="user-avatar" id="userAvatar">G</div>
  <h3 id="userName">Invité</h3>
  <p id="userEmail"></p>
  <button onclick="loginGoogle()">Connexion Google</button>
  <button onclick="loginEmail()">Connexion Email</button>
</div>

<nav class="bottom-nav">
  <button onclick="showMap()">Carte</button>
  <button onclick="togglePublish()">Publier</button>
  <button onclick="toggleAccount()">Compte</button>
</nav>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.min.js"></script>
<script src="app.js"></script>
</body>
    </html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JobMarket Pro</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div id="loader">Chargement...</div>

<div class="top-bar">
  <div class="user">🟢 JobMarket</div>
</div>

<div class="search-box">
  <input id="search" placeholder="Rechercher un métier...">
</div>

<div id="map"></div>

<div class="filters">
  <div class="filter active" onclick="filterJobs(event,'all')">Tous</div>
  <div class="filter" onclick="filterJobs(event,'plombier')">🔧</div>
  <div class="filter" onclick="filterJobs(event,'électricien')">⚡</div>
  <div class="filter" onclick="filterJobs(event,'coiffeuse')">✂️</div>
  <div class="filter" onclick="filterJobs(event,'vendeuse')">🛒</div>
</div>

<div class="right-controls">
  <div class="btn" onclick="goToUser()">📍</div>
</div>

<div class="distance-box">
  <div class="title">Distance</div>
  <div class="value">-- km</div>
</div>

<div class="fab" onclick="createJob()">+</div>

<div class="bottom-nav">
  <div class="nav-item active">💼 Jobs</div>
  <div class="nav-item">🗺️ Carte</div>
  <div class="nav-item">👤 Compte</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script type="module" src="app.js"></script>

</body>
                  </html>

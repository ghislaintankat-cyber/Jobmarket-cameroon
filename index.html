<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🛰️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #f59e0b; --dark: #0f172a; --dark-light: #1e293b; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: var(--dark); font-family: sans-serif; color: white; overflow: hidden; }
        header { background: var(--dark-light); padding: 15px; text-align: center; border-bottom: 2px solid var(--gold); z-index: 1000; }
        
        #map { flex-grow: 1; width: 100%; }

        .search-container { background: #1e293b; padding: 10px; z-index: 1000; }
        #nameSearch { width: 100%; padding: 10px; border-radius: 20px; border: 1px solid var(--gold); background: var(--dark); color: white; outline: none; box-sizing: border-box; }

        .filter-bar { display: flex; overflow-x: auto; background: #1e293b; padding: 5px 10px 10px; gap: 8px; border-bottom: 1px solid #334155; z-index: 1000; }
        .filter-btn { background: #334155; color: white; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 15px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--gold); color: #0f172a; font-weight: bold; }

        .btn-float { position: fixed; bottom: 20px; right: 20px; left: 20px; background: var(--gold); color: #0f172a; border: none; height: 50px; border-radius: 25px; font-weight: bold; z-index: 1000; cursor: pointer; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--dark-light); padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid var(--gold); }
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: var(--dark); color: white; box-sizing: border-box; }
        .btn-wa { background: #25D366; color: white; padding: 10px; display: block; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }

        .custom-icon { display: flex; justify-content: center; align-items: center; font-size: 20px; background: white; border-radius: 50%; border: 2px solid var(--gold); width: 30px !important; height: 30px !important; }
    </style>
</head>
<body>

    <header><b>JOBMARKET CAMEROON 🛰️</b></header>
    
    <div class="search-container">
        <input type="text" id="nameSearch" placeholder="🔍 Chercher un nom ou métier..." oninput="applyFilters()">
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setCategory('Tous', this)">🌍 Tous</button>
        <button class="filter-btn" onclick="setCategory('🏊 Nageur', this)">🏊 Nageurs</button>
        <button class="filter-btn" onclick="setCategory('🛠️ Dépannage', this)">🛠️ Dépannage</button>
        <button class="filter-btn" onclick="setCategory('📦 Livraison', this)">📦 Livraison</button>
    </div>

    <div id="map"></div>
    <button class="btn-float" onclick="useGPS()">📍 UTILISER MON GPS</button>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--gold)">Publier ici ✨</h3>
            <select id="mType">
                <option value="🏊 Nageur">🏊 Maître-Nageur</option>
                <option value="🛠️ Dépannage">🛠️ Dépannage</option>
                <option value="📦 Livraison">📦 Livraison</option>
                <option value="🧹 Ménage">🧹 Ménage</option>
            </select>
            <input type="text" id="userName" placeholder="Ton nom">
            <input type="number" id="userPhone" placeholder="WhatsApp (ex: 695...)">
            <textarea id="mDesc" rows="3" placeholder="Description..."></textarea>
            <button class="btn-float" style="position:static; width:100%" onclick="finaliserPublication()">VALIDER</button>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        var map = L.map('map', { zoomControl: false }).setView([3.848, 11.502], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let allMarkers = [];
        let currentCategory = 'Tous';
        let tempCoords = null;

        window.setCategory = (cat, btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = cat;
            applyFilters();
        };

        window.applyFilters = () => {
            const search = document.getElementById('nameSearch').value.toLowerCase();
            allMarkers.forEach(item => {
                const matchCat = (currentCategory === 'Tous' || item.type === currentCategory);
                const matchSearch = item.name.toLowerCase().includes(search) || item.desc.toLowerCase().includes(search);
                if(matchCat && matchSearch) { map.addLayer(item.marker); }
                else { map.removeLayer(item.marker); }
            });
        };

        function getEmoji(type) {
            if(type.includes("Nageur")) return "🏊";
            if(type.includes("Dépannage")) return "🛠️";
            if(type.includes("Livraison")) return "📦";
            return "💼";
        }

        db.ref('missions').on('child_added', (snap) => {
            const m = snap.val();
            const icon = L.divIcon({
                className: 'custom-icon',
                html: getEmoji(m.type),
                iconSize:
            });
            const marker = L.marker([m.lat, m.lng], {icon: icon}).addTo(map)
                .bindPopup(`<b>${m.type}</b><br>👤 ${m.name}<br>${m.desc}<br><a href="https://wa.me/237${m.phone}" class="btn-wa">💬 WhatsApp</a>`);
            
            allMarkers.push({ marker: marker, type: m.type, name: m.name, desc: m.desc });
        });

        map.on('click', (e) => { tempCoords = e.latlng; document.getElementById('pubModal').style.display = 'flex'; });
        window.closeModal = () => { document.getElementById('pubModal').style.display = 'none'; };

        window.useGPS = () => {
            navigator.geolocation.getCurrentPosition(p => {
                map.flyTo([p.coords.latitude, p.coords.longitude], 15);
                tempCoords = {lat: p.coords.latitude, lng: p.coords.longitude};
                alert("Position trouvée ! Cliquez maintenant sur 'Valider' pour publier ici.");
                document.getElementById('pubModal').style.display = 'flex';
            }, () => alert("Active ton GPS !"));
        };

        window.finaliserPublication = () => {
            const data = {
                type: document.getElementById('mType').value,
                name: document.getElementById('userName').value || "Anonyme",
                phone: document.getElementById('userPhone').value,
                desc: document.getElementById('mDesc').value,
                lat: tempCoords.lat, lng: tempCoords.lng
            };
            if(!data.phone || !data.desc) return alert("Remplis tout !");
            db.ref('missions').push(data).then(() => closeModal());
        };
    </script>
</body>
</html>

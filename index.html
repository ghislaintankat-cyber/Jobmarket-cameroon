<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JobMarket Cameroun 🛰️</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body { margin: 0; background: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        header { padding: 15px; background: #1e293b; text-align: center; border-bottom: 3px solid #06b6d4; box-shadow: 0 4px 6px rgba(0,0,0,0.3); z-index: 1000; }
        #map { flex: 1; background: #222; width: 100%; }
        .footer { padding: 15px; background: #0f172a; border-top: 1px solid #334155; }
        .btn { background: #06b6d4; color: #0f172a; border: none; padding: 15px; border-radius: 12px; font-weight: bold; width: 100%; cursor: pointer; font-size: 1rem; transition: 0.3s; }
        .btn:active { transform: scale(0.95); background: #22d3ee; }
        
        /* Fenêtre de Publication */
        #formModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 2000; justify-content: center; align-items: center; backdrop-filter: blur(5px); }
        .modal-content { background: #1e293b; padding: 25px; border-radius: 20px; width: 85%; max-width: 400px; border: 1px solid #06b6d4; }
        h3 { margin-top: 0; color: #06b6d4; }
        input, textarea, select { width: 100%; margin-bottom: 12px; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; box-sizing: border-box; font-size: 16px; }
        
        /* Style des Icônes sur la carte */
        .custom-div-icon { background: none; border: none; }
        .marker-pin { background: #06b6d4; width: 35px; height: 35px; border-radius: 50% 50% 50% 0; border: 2px solid white; display: flex; align-items: center; justify-content: center; font-size: 20px; transform: rotate(-45deg); margin-left: -17px; margin-top: -35px; }
        .marker-pin span { transform: rotate(45deg); }
    </style>
</head>
<body>

<header><b>JOBMARKET CAMEROUN 🛰️</b></header>
<div id="map"></div>
<div class="footer">
    <button class="btn" onclick="document.getElementById('formModal').style.display='flex'">🚀 PUBLIER UNE MISSION ICI</button>
</div>

<div id="formModal">
    <div class="modal-content">
        <h3>Nouvelle Mission</h3>
        <select id="mType">
            <option value="🛠️">🛠️ Dépannage</option>
            <option value="📦">📦 Livraison</option>
            <option value="🧹">🧹 Ménage / Aide</option>
            <option value="🚕">🚕 Transport</option>
        </select>
        <input type="text" id="userName" placeholder="Ton nom">
        <input type="number" id="userPhone" placeholder="WhatsApp (ex: 699001122)">
        <textarea id="mDesc" rows="3" placeholder="Description de la tâche et prix..."></textarea>
        <button class="btn" id="finalPubBtn" onclick="publier()">VALIDER & LOCALISER</button>
        <button class="btn" style="background:#475569; color:white; margin-top:8px;" onclick="document.getElementById('formModal').style.display='none'">Annuler</button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, onChildAdded } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
    authDomain: "jobmarketfuture.firebaseapp.com",
    databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
    projectId: "jobmarketfuture",
    storageBucket: "jobmarketfuture.firebasestorage.app",
    messagingSenderId: "351669024349",
    appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const missionsRef = ref(db, 'missions');

  // CARTE EN MODE SATELLITE HYBRIDE
  var map = L.map('map').setView([3.848, 11.502], 13);
  L.tileLayer('https://mt1.google.com/vt/lyrs=y&x={x}&y={y}&z={z}').addTo(map);

  setTimeout(() => { map.invalidateSize(); }, 1000);

  window.publier = function() {
    const btn = document.getElementById('finalPubBtn');
    const data = {
        type: document.getElementById('mType').value,
        name: document.getElementById('userName').value || "Anonyme",
        phone: document.getElementById('userPhone').value,
        desc: document.getElementById('mDesc').value
    };

    if(!data.phone || !data.desc) return alert("⚠️ Remplis ton WhatsApp et la description !");
    
    btn.innerText = "🛰️ Recherche GPS en cours...";
    btn.disabled = true;

    map.locate({setView: true, maxZoom: 16});
    
    map.once('locationfound', (e) => {
        data.lat = e.latlng.lat;
        data.lng = e.latlng.lng;
        push(missionsRef, data).then(() => { 
            alert("✅ Mission publiée sur la carte !"); 
            location.reload(); 
        });
    });

    map.once('locationerror', () => {
        alert("❌ Active ton GPS et autorise le site pour publier !");
        btn.innerText = "VALIDER & LOCALISER";
        btn.disabled = false;
    });
  };

  // AFFICHAGE DES MISSIONS AVEC ICONES
  onChildAdded(missionsRef, (snap) => {
    const m = snap.val();
    if(m.lat && m.lng) {
        const customIcon = L.divIcon({
            className: 'custom-div-icon',
            html: `<div class="marker-pin"><span>${m.type}</span></div>`,
            iconSize:,
            iconAnchor:
        });

        L.marker([m.lat, m.lng], {icon: customIcon}).addTo(map)
         .bindPopup(`
            <div style="color:#0f172a; font-family:sans-serif;">
                <b style="font-size:1.2rem;">${m.type} ${m.name}</b><br>
                <p>${m.desc}</p>
                <a href="https://wa.me/237${m.phone}" target="_blank" 
                   style="display:block; background:#25D366; color:white; text-align:center; padding:10px; border-radius:8px; text-decoration:none; font-weight:bold;">
                   💬 WhatsApp : ${m.phone}
                </a>
            </div>
         `);
    }
  });
</script>
</body>
  </html>

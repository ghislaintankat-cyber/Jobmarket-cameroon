<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobMarket Ultra 🌍</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css"/>

<style>
:root { --gold:#f59e0b; --dark:#0f172a; }
body,html{margin:0;height:100%;overflow:hidden;font-family:sans-serif;}
#map{position:absolute;width:100%;height:100%;}

.btn{
position:absolute;right:15px;width:45px;height:45px;
background:white;border-radius:12px;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
cursor:pointer;z-index:1000;
}
#gps{top:20px;}
#mapType{top:75px;}
#clear{top:130px;background:red;color:white;display:none;}

#add{
position:absolute;bottom:90px;right:20px;
width:65px;height:65px;border-radius:50%;
background:var(--gold);color:white;font-size:30px;border:none;
z-index:1000;
}

.panel{
position:fixed;bottom:-100%;left:0;width:100%;
background:#0f172a;color:white;padding:20px;
transition:.4s;z-index:2000;border-radius:20px 20px 0 0;
}
.panel.active{bottom:0;}

input,textarea{
width:100%;padding:12px;margin:8px 0;
background:#1e293b;border:none;color:white;border-radius:8px;
}

#routeBox{
position:absolute;top:20px;left:50%;
transform:translateX(-50%);
background:#000a;color:white;padding:10px 20px;
border-radius:20px;border:2px solid var(--gold);
z-index:1000;display:none;
}

#bottomNav{
position:absolute;bottom:0;width:100%;
background:white;display:flex;
justify-content:space-around;padding:10px 0;
z-index:1000;
}

.nav-btn{
text-align:center;font-size:12px;
cursor:pointer;
}
</style>
</head>

<body>

<div id="routeBox"></div>
<div id="map"></div>

<div id="gps" class="btn" onclick="centerUser()">🎯</div>
<div id="mapType" class="btn" onclick="toggleMap()">🛰️</div>
<div id="clear" class="btn" onclick="clearRoute()">❌</div>
<button id="add" onclick="togglePanel()">+</button>

<div id="panel" class="panel">
<input id="title" placeholder="Métier">
<input id="phone" placeholder="WhatsApp">
<textarea id="desc" placeholder="Description"></textarea>
<button onclick="publish()">Publier</button>
</div>

<div id="bottomNav">
<div class="nav-btn">🧳 Jobs</div>
<div class="nav-btn">🗺️ Carte</div>
<div class="nav-btn">💰 Business</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>

<script>

// Firebase
firebase.initializeApp({
  apiKey: "TON_API_KEY",
  authDomain: "TON_DOMAIN",
  databaseURL: "TON_DB_URL",
  projectId: "TON_ID"
});
const db = firebase.database();

// ADMIN
let click=0;
let admin=false;
document.body.addEventListener("click",()=>{
click++;
if(click===5){
let code=prompt("Code admin");
if(code==="237BO"){admin=true;alert("ADMIN ACTIVÉ");}
click=0;
}
});

// MAP
let map=L.map('map',{maxZoom:22}).setView([3.86,11.51],7);

let normal=L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
let sat=L.layerGroup([
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
]);

let mode="normal";
function toggleMap(){
if(mode==="normal"){map.removeLayer(normal);sat.addTo(map);mode="sat";}
else{map.removeLayer(sat);normal.addTo(map);mode="normal";}
}

// GPS
let userPos=null;
navigator.geolocation.watchPosition(pos=>{
userPos=[pos.coords.latitude,pos.coords.longitude];
});

// CENTER
function centerUser(){
if(userPos)map.setView(userPos,16);
}

// ROUTE
let route=null;
function createRoute(lat,lng){
if(!userPos)return alert("Active GPS");

if(route)map.removeControl(route);

route=L.Routing.control({
waypoints:[L.latLng(userPos),L.latLng(lat,lng)],
createMarker:()=>null
}).on('routesfound',e=>{
let r=e.routes[0].summary;
routeBox.innerHTML=`${(r.totalDistance/1000).toFixed(1)} km | ${Math.round(r.totalTime/60)} min`;
routeBox.style.display="block";
clear.style.display="flex";
}).addTo(map);
}

function clearRoute(){
if(route)map.removeControl(route);
routeBox.style.display="none";
clear.style.display="none";
}

// PANEL
function togglePanel(){panel.classList.toggle("active");}

// PUBLISH
function publish(){

if(!title.value || !phone.value){
return alert("Remplis les champs");
}

db.ref("jobs").push({
title:title.value,
phone:phone.value,
desc:desc.value,
lat:map.getCenter().lat,
lng:map.getCenter().lng,
time:Date.now()
});

title.value="";
phone.value="";
desc.value="";

togglePanel();
}

// DELETE
function deleteJob(id){
if(admin){
db.ref("jobs/"+id).remove();
}
}

// LOAD JOBS
db.ref("jobs").on("value",snap=>{

map.eachLayer(l=>{
if(l instanceof L.Marker)map.removeLayer(l);
});

snap.forEach(j=>{
let d=j.val();
let key=j.key;

if(Date.now()-d.time > 30*24*60*60*1000){
db.ref("jobs/"+key).remove();
return;
}

let marker=L.marker([d.lat,d.lng]).addTo(map);

marker.bindPopup(`
<b>${d.title}</b><br>
${d.desc}<br><br>
<button onclick="createRoute(${d.lat},${d.lng})">Itinéraire</button><br>
<a href="https://wa.me/${d.phone}" target="_blank">WhatsApp</a><br>
${admin ? `<button onclick="deleteJob('${key}')">Supprimer</button>` : ""}
`);
});
});

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JobMarket Cameroon 🛰️</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.7.1/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.7.1/dist/leaflet.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.1.1/firebase-database-compat.js"></script>
    
    <style>
        :root { --gold: #f59e0b; --gold-light: #fcd34d; --dark: #0f172a; --dark-light: #1e293b; }
        body { margin: 0; padding: 0; height: 100vh; display: flex; flex-direction: column; background: var(--dark); font-family: sans-serif; overflow: hidden; color: white; }
        header { background: var(--dark-light); padding: 10px; text-align: center; border-bottom: 2px solid var(--gold); z-index: 2000; }
        
        .search-container { background: #1e293b; padding: 10px; z-index: 1000; }
        #nameSearch { width: 100%; padding: 12px; border-radius: 20px; border: 1px solid var(--gold); background: var(--dark); color: white; outline: none; box-sizing: border-box; font-size: 16px; }

        .filter-bar { display: flex; overflow-x: auto; background: #1e293b; padding: 5px 10px 10px 10px; gap: 8px; border-bottom: 1px solid #334155; z-index: 1000; }
        .filter-btn { background: #334155; color: white; border: 1px solid var(--gold); padding: 5px 15px; border-radius: 15px; font-size: 12px; white-space: nowrap; cursor: pointer; }
        .filter-btn.active { background: var(--gold); color: #0f172a; font-weight: bold; }

        #map { flex-grow: 1; width: 100%; height: 100%; background: #0f172a; }
        
        .btn-float { position: fixed; bottom: 20px; right: 20px; left: 20px; background: linear-gradient(45deg, var(--gold), var(--gold-light)); color: #0f172a; border: none; height: 55px; border-radius: 30px; font-weight: bold; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); cursor: pointer; font-size: 14px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 3000; justify-content: center; align-items: center; }
        .modal-content { background: var(--dark-light); padding: 20px; border-radius: 20px; width: 85%; max-width: 350px; border: 1px solid var(--gold); }
        
        input, textarea, select { width: 100%; margin-bottom: 10px; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: var(--dark); color: white; font-size: 16px; box-sizing: border-box; }
        .btn-wa { background: #25D366; color: white; padding: 10px; display: block; text-align: center; text-decoration: none; border-radius: 10px; font-weight: bold; margin-top: 10px; }
        
        .custom-icon { display: flex; justify-content: center; align-items: center; font-size: 22px; background: white; border-radius: 50%; border: 2px solid var(--gold); box-shadow: 0 2px 5px rgba(0,0,0,0.4); }
    </style>
</head>
<body>

    <header><b>JOBMARKET CAMEROON 🛰️</b></header>
    
    <div class="search-container">
        <input type="text" id="nameSearch" placeholder="🔍 Chercher un nom ou métier..." oninput="applyFilters()">
    </div>

    <div class="filter-bar">
        <button class="filter-btn active" onclick="setCategory('Tous', this)">🌍 Tous</button>
        <button class="filter-btn" onclick="setCategory('🏊 Nageur', this)">🏊 Nageurs</button>
        <button class="filter-btn" onclick="setCategory('🛠️ Dépannage', this)">🛠️ Dépannage</button>
        <button class="filter-btn" onclick="setCategory('📦 Livraison', this)">📦 Livraison</button>
        <button class="filter-btn" onclick="setCategory('🧹 Ménage', this)">🧹 Ménage</button>
    </div>

    <div id="map"></div>
    <button class="btn-float" onclick="useGPS()">📍 UTILISER MON GPS ACTUEL</button>

    <div id="pubModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--gold-light)">Publier ici ✨</h3>
            <select id="mType">
                <option value="🏊 Nageur">🏊 Maître-Nageur</option>
                <option value="🛠️ Dépannage">🛠️ Dépannage</option>
                <option value="📦 Livraison">📦 Livraison</option>
                <option value="🧹 Ménage">🧹 Ménage</option>
            </select>
            <input type="text" id="userName" placeholder="Ton nom">
            <input type="number" id="userPhone" placeholder="WhatsApp (ex: 695...)">
            <textarea id="mDesc" rows="3" placeholder="Description du service..."></textarea>
            <button class="btn-float" style="position:static; width:100%" onclick="finaliserPublication()">VALIDER ✨</button>
            <button onclick="closeModal()" style="background:none; border:none; color:gray; width:100%; margin-top:10px;">Annuler</button>
        </div>
    </div>

    <script>
        // Config Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCR1Z6VlS5A7iPbUCoVm0AQcnkkUdsA0CE",
            authDomain: "jobmarketfuture.firebaseapp.com",
            databaseURL: "https://jobmarketfuture-default-rtdb.firebaseio.com",
            projectId: "jobmarketfuture",
            appId: "1:351669024349:web:d4d4d08727ccc6012b7fb4"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // Init Carte
        var map = L.map('map', { zoomControl: false, tap: false }).setView([3.848, 11.502], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        // Correction Écran Noir
        setTimeout(() => { map.invalidateSize(); }, 1000);

        let allMarkers = [];
        let currentCategory = 'Tous';
        let tempCoords = null;

        // --- FILTRES ---
        window.setCategory = (category, btn) => {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentCategory = category;
            applyFilters();
        };

        window.applyFilters = () => {
            const searchTerm = document.getElementById('nameSearch').value.toLowerCase();
            allMarkers.forEach(m => {
                const matchCat = (currentCategory === 'Tous' || m.jobType === currentCategory);
                const matchName = m.uName.toLowerCase().includes(searchTerm) || m.uDesc.toLowerCase().includes(searchTerm);
                if (matchCat && matchName) { map.addLayer(m.marker); } 
                else { map.removeLayer(m.marker); }
            });
        };

        // --- GPS ---
        window.useGPS = () => {
            if (!navigator.geolocation) return alert("GPS non supporté sur ce navigateur.");
            
            navigator.geolocation.getCurrentPosition((pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                map.flyTo([lat, lng], 16);
                tempCoords = {lat: lat, lng: lng};
                // Ouvre le formulaire après 1 seconde
                setTimeout(() => { document.getElementById('pubModal').style.display = 'flex'; }, 1000);
            }, (err) => {
                alert("Erreur : Active ton GPS et autorise le site à te localiser !");
            }, { enableHighAccuracy: true });
        };

        // --- ICONES & CHARGEMENT ---
        function getMarkerIcon(type) {
            if(type.includes("Nageur")) return "🏊";
            if(type.includes("Dépannage")) return "🛠️";
            if(type.includes("Livraison")) return "📦";
            if(type.includes("Ménage")) return "🧹";
            return "💼";
        }

        db.ref('missions').on('child_added', (snap) => {
            const m = snap.val();
            const icon = L.divIcon({
                className: 'custom-icon',
                html: `<div>${getMarkerIcon(m.type)}</div>`,
                iconSize:,
                iconAnchor:
            });

            const marker = L.marker([m.lat, m.lng], {icon: icon}).addTo(map)
                            .bindPopup(`<b>${m.type}</b><br>👤 ${m.name}<hr>${m.desc}<br><a href="https://wa.me/237${m.phone}" class="btn-wa">💬 WhatsApp</a>`);
            
            allMarkers.push({ marker: marker, jobType: m.type, uName: m.name, uDesc: m.desc });
        });

        // --- ACTIONS ---
        map.on('click', (e) => { 
            tempCoords = e.latlng; 
            document.getElementById('pubModal').style.display = 'flex'; 
        });

        window.closeModal = () => { document.getElementById('pubModal').style.display = 'none'; };

        window.finaliserPublication = () => {
            const data = {
                type: document.getElementById('mType').value,
                name: document.getElementById('userName').value || "Anonyme",
                phone: document.getElementById('userPhone').value,
                desc: document.getElementById('mDesc').value,
                lat: tempCoords.lat, lng: tempCoords.lng
            };
            if(!data.phone || !data.desc) return alert("S'il te plaît, remplis le numéro et la description !");
            db.ref('missions').push(data).then(() => { closeModal(); });
        };
    </script>
</body>
</html>
